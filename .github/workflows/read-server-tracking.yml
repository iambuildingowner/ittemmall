name: Read Server Tracking Counts

on:
  workflow_dispatch:
    inputs:
      date:
        description: KST date to read, YYYY-MM-DD.
        required: true
        type: string
      since_kst:
        description: Optional KST lower bound, e.g. 2026-07-03T05:30:00+09:00.
        required: false
        type: string

jobs:
  read-live-track-log:
    name: Upload temporary reader and summarize tracking log
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate FTP secrets
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_TARGET_DIR: ${{ secrets.HOSTINGER_FTP_TARGET_DIR }}
        run: |
          missing=0
          for name in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD HOSTINGER_FTP_TARGET_DIR; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install FTP reader
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Read live tracking log
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_TARGET_DIR: ${{ secrets.HOSTINGER_FTP_TARGET_DIR }}
          INPUT_DATE: ${{ inputs.date }}
          INPUT_SINCE_KST: ${{ inputs.since_kst }}
        run: |
          set -euo pipefail
          reader="__codex-track-reader-${GITHUB_RUN_ID}.php"
          token="$(openssl rand -hex 32)"
          target_dir="${HOSTINGER_FTP_TARGET_DIR%/}"

          cleanup() {
            lftp -u "$HOSTINGER_FTP_USERNAME","$HOSTINGER_FTP_PASSWORD" "$HOSTINGER_FTP_SERVER" \
              -e "set ftp:ssl-force true; set ssl:verify-certificate no; set net:timeout 20; set net:max-retries 2; set ftp:passive-mode true; rm -f \"${target_dir}/${reader}\"; bye" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          cat > "$reader" <<'PHP'
          <?php
          declare(strict_types=1);

          $expectedToken = '__CODEX_TOKEN__';
          $givenToken = (string)($_GET['token'] ?? '');
          if (!hash_equals($expectedToken, $givenToken)) {
              http_response_code(404);
              echo 'not_found';
              exit;
          }

          require_once __DIR__ . '/payment/server-config-lib.php';
          header('Content-Type: application/json; charset=utf-8');
          header('Cache-Control: no-store');

          function clean_value(mixed $value, int $max = 240): string
          {
              $text = trim((string)$value);
              $text = preg_replace('/\s+/', ' ', $text) ?? $text;
              if (function_exists('mb_substr')) {
                  return mb_substr($text, 0, $max, 'UTF-8');
              }
              return substr($text, 0, $max);
          }

          function counter_add(array &$counter, string $key): void
          {
              if ($key === '') {
                  $key = '(empty)';
              }
              $counter[$key] = ($counter[$key] ?? 0) + 1;
          }

          function is_button_event(string $eventName): bool
          {
              return $eventName === 'NpayPurchaseClick'
                  || $eventName === 'PurchaseCtaClick'
                  || str_starts_with($eventName, 'NpayPurchaseClick_')
                  || str_starts_with($eventName, 'PurchaseCtaClick_');
          }

          $date = (string)($_GET['date'] ?? '');
          if (!preg_match('/^\d{4}-\d{2}-\d{2}$/', $date)) {
              $date = (new DateTimeImmutable('now', new DateTimeZone('Asia/Seoul')))->format('Y-m-d');
          }

          $sinceRaw = (string)($_GET['since'] ?? '');
          $sinceTs = $sinceRaw !== '' ? strtotime($sinceRaw) : false;
          $logPath = ittemmallEffectiveTrackLogPath($date);
          $result = [
              'ok' => true,
              'date' => $date,
              'since_kst' => $sinceRaw,
              'log_exists' => is_file($logPath),
              'log_readable' => is_readable($logPath),
              'rows_total' => 0,
              'rows_included' => 0,
              'unique_visitors' => 0,
              'button_rows_count' => 0,
              'event_counts' => [],
              'product_counts' => [],
              'path_counts' => [],
              'button_rows' => [],
              'latest_rows' => [],
          ];

          if (!is_file($logPath) || !is_readable($logPath)) {
              echo json_encode($result, JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES);
              exit;
          }

          $lines = file($logPath, FILE_IGNORE_NEW_LINES | FILE_SKIP_EMPTY_LINES);
          $visitors = [];
          foreach ($lines === false ? [] : $lines as $line) {
              $entry = json_decode($line, true);
              if (!is_array($entry)) {
                  continue;
              }
              $eventName = clean_value($entry['event'] ?? '', 120);
              if ($eventName === '') {
                  continue;
              }
              $result['rows_total']++;
              $timeKst = clean_value($entry['server_time_kst'] ?? '', 80);
              $timeTs = $timeKst !== '' ? strtotime($timeKst) : false;
              if ($sinceTs !== false && ($timeTs === false || $timeTs < $sinceTs)) {
                  continue;
              }
              $payload = is_array($entry['payload'] ?? null) ? $entry['payload'] : [];
              $attribution = is_array($payload['attribution'] ?? null) ? $payload['attribution'] : (is_array($entry['attribution'] ?? null) ? $entry['attribution'] : []);
              $product = clean_value($entry['product_focus'] ?? $payload['productSlug'] ?? $payload['productId'] ?? $payload['content_name'] ?? '(unknown)', 160);
              $path = clean_value($entry['path'] ?? '', 260);
              if ($path === '' && !empty($entry['url'])) {
                  $urlPath = parse_url((string)$entry['url'], PHP_URL_PATH);
                  $path = clean_value($urlPath ?: (string)$entry['url'], 260);
              }
              $visitor = clean_value(substr((string)($entry['request']['ip_hash'] ?? $entry['ipHash'] ?? ''), 0, 12), 20);
              if ($visitor !== '') {
                  $visitors[$visitor] = true;
              }

              $row = [
                  'time_kst' => str_replace('T', ' ', substr($timeKst, 0, 19)),
                  'event' => $eventName,
                  'product' => $product,
                  'path' => $path,
                  'source' => clean_value($attribution['utm_source'] ?? $attribution['source'] ?? $payload['source'] ?? '', 120),
                  'campaign' => clean_value($attribution['utm_campaign'] ?? '', 180),
                  'content' => clean_value($attribution['utm_content'] ?? '', 180),
                  'term' => clean_value($attribution['utm_term'] ?? '', 180),
                  'test_id' => clean_value($payload['testRunId'] ?? $payload['test_run_id'] ?? '-', 140),
                  'visitor' => $visitor,
              ];

              $result['rows_included']++;
              counter_add($result['event_counts'], $eventName);
              counter_add($result['product_counts'], $product);
              counter_add($result['path_counts'], $path);
              $result['latest_rows'][] = $row;
              if (count($result['latest_rows']) > 80) {
                  array_shift($result['latest_rows']);
              }
              if (is_button_event($eventName)) {
                  $result['button_rows'][] = $row + [
                      'product_name' => clean_value($payload['productName'] ?? $payload['content_name'] ?? '', 180),
                      'options' => clean_value(json_encode($payload['selectedOptions'] ?? [], JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES), 240),
                  ];
              }
          }

          arsort($result['event_counts']);
          arsort($result['product_counts']);
          arsort($result['path_counts']);
          $result['unique_visitors'] = count($visitors);
          $result['button_rows_count'] = count($result['button_rows']);
          $result['button_rows'] = array_slice($result['button_rows'], -100);
          echo json_encode($result, JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES);
          PHP

          perl -0pi -e "s/__CODEX_TOKEN__/$token/g" "$reader"

          lftp -u "$HOSTINGER_FTP_USERNAME","$HOSTINGER_FTP_PASSWORD" "$HOSTINGER_FTP_SERVER" \
            -e "set ftp:ssl-force true; set ssl:verify-certificate no; set net:timeout 20; set net:max-retries 2; set ftp:passive-mode true; put -O \"$target_dir\" \"$reader\"; bye"

          encoded_since="$(node -e 'console.log(encodeURIComponent(process.env.INPUT_SINCE_KST || ""))')"
          curl -fsS "https://ittemmall.com/${reader}?token=${token}&date=${INPUT_DATE}&since=${encoded_since}" > live-track-report.json

          node <<'NODE'
          const fs = require("fs");
          const data = JSON.parse(fs.readFileSync("live-track-report.json", "utf8"));
          const summary = [
            `date=${data.date}`,
            `since_kst=${data.since_kst || "(none)"}`,
            `log_exists=${data.log_exists}`,
            `log_readable=${data.log_readable}`,
            `rows_total=${data.rows_total}`,
            `rows_included=${data.rows_included}`,
            `unique_visitors=${data.unique_visitors}`,
            `button_rows_count=${data.button_rows_count}`,
          ];
          console.log(summary.join("\n"));

          function table(title, rows, columns) {
            console.log(`\n${title}`);
            console.log(`| ${columns.join(" | ")} |`);
            console.log(`| ${columns.map(() => "---").join(" | ")} |`);
            for (const row of rows) {
              console.log(`| ${columns.map((key) => String(row[key] ?? "").replace(/\|/g, "/")).join(" | ")} |`);
            }
          }

          table("button_rows", data.button_rows || [], ["time_kst", "event", "product", "product_name", "source", "campaign", "content", "term", "test_id", "visitor", "path"]);
          table("latest_rows", (data.latest_rows || []).slice(-30).reverse(), ["time_kst", "event", "product", "source", "campaign", "content", "term", "test_id", "visitor", "path"]);

          console.log("\nevent_counts");
          console.log(JSON.stringify(data.event_counts || {}, null, 2));
          console.log("\nproduct_counts");
          console.log(JSON.stringify(data.product_counts || {}, null, 2));
          console.log("\npath_counts");
          console.log(JSON.stringify(data.path_counts || {}, null, 2));
          NODE
