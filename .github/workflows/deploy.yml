name: Deploy to Hostinger

on:
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload ittemmall public web root
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate FTP secrets
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_TARGET_DIR: ${{ secrets.HOSTINGER_FTP_TARGET_DIR }}
        run: |
          missing=0
          for name in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD HOSTINGER_FTP_TARGET_DIR; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Build public package
        run: |
          python3 scripts/build_deployment_package.py
          python3 scripts/deployment_readiness_report.py --allow-owner-tasks

      - name: Build private runtime config
        env:
          ITTEMMALL_ADMIN_TOKEN: ${{ secrets.ITTEMMALL_ADMIN_TOKEN }}
          ITTEMMALL_TRACK_LOG_PATH: ${{ secrets.ITTEMMALL_TRACK_LOG_PATH }}
          ITTEMMALL_TRACK_SALT: ${{ secrets.ITTEMMALL_TRACK_SALT }}
          ITTEMMALL_ORDER_STORE_PATH: ${{ secrets.ITTEMMALL_ORDER_STORE_PATH }}
          ITTEMMALL_RATE_LIMIT_PATH: ${{ secrets.ITTEMMALL_RATE_LIMIT_PATH }}
          ITTEMMALL_NOTIFY_ENABLED: ${{ secrets.ITTEMMALL_NOTIFY_ENABLED }}
          ITTEMMALL_NOTIFY_EMAIL: ${{ secrets.ITTEMMALL_NOTIFY_EMAIL }}
          ITTEMMALL_NOTIFY_FROM: ${{ secrets.ITTEMMALL_NOTIFY_FROM }}
          TOSS_PAYMENTS_MID: ${{ secrets.TOSS_PAYMENTS_MID }}
          TOSS_PAYMENTS_CLIENT_KEY: ${{ secrets.TOSS_PAYMENTS_CLIENT_KEY }}
          TOSS_PAYMENTS_SECRET_KEY: ${{ secrets.TOSS_PAYMENTS_SECRET_KEY }}
          TOSS_PAYMENTS_PAYMENT_WIDGET_VARIANT_KEY: ${{ secrets.TOSS_PAYMENTS_PAYMENT_WIDGET_VARIANT_KEY }}
          TOSS_PAYMENTS_APPROVE_ENABLED: ${{ secrets.TOSS_PAYMENTS_APPROVE_ENABLED }}
          NAVER_PAY_CLIENT_ID: ${{ secrets.NAVER_PAY_CLIENT_ID }}
          NAVER_PAY_CHAIN_ID: ${{ secrets.NAVER_PAY_CHAIN_ID }}
          NAVER_PAY_CLIENT_SECRET: ${{ secrets.NAVER_PAY_CLIENT_SECRET }}
          NAVER_PAY_MODE: ${{ secrets.NAVER_PAY_MODE }}
          NAVER_PAY_APPROVE_URL: ${{ secrets.NAVER_PAY_APPROVE_URL }}
          NAVER_PAY_APPROVE_ENABLED: ${{ secrets.NAVER_PAY_APPROVE_ENABLED }}
          NAVER_PAY_CANCEL_URL: ${{ secrets.NAVER_PAY_CANCEL_URL }}
          NAVER_PAY_CANCEL_ENABLED: ${{ secrets.NAVER_PAY_CANCEL_ENABLED }}
        run: |
          if [ -z "${ITTEMMALL_ADMIN_TOKEN:-}" ]; then
            echo "::warning::ITTEMMALL_ADMIN_TOKEN is missing. Private tracking report access will remain disabled."
            echo "PRIVATE_CONFIG_READY=0" >> "$GITHUB_ENV"
            exit 0
          fi
          python3 scripts/write_runtime_config.py build/ittemmall-private/ittemmall-server-config.php
          echo "PRIVATE_CONFIG_READY=1" >> "$GITHUB_ENV"

      - name: Deploy by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./build/ittemmall-public/
          server-dir: ${{ secrets.HOSTINGER_FTP_TARGET_DIR }}
          dangerous-clean-slate: false
          timeout: 190000
          log-level: standard

      - name: Install private FTP uploader
        if: env.PRIVATE_CONFIG_READY == '1'
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy private runtime config
        if: env.PRIVATE_CONFIG_READY == '1'
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_TARGET_DIR: ${{ secrets.HOSTINGER_FTP_TARGET_DIR }}
        run: |
          set -euo pipefail
          target_dir="${HOSTINGER_FTP_TARGET_DIR%/}"
          target_parent="$(dirname "$target_dir")"
          private_dir="${target_parent}/ittemmall-private"
          lftp -u "$HOSTINGER_FTP_USERNAME","$HOSTINGER_FTP_PASSWORD" "$HOSTINGER_FTP_SERVER" \
            -e "set ftp:ssl-force true; set ssl:verify-certificate no; set net:timeout 20; set net:max-retries 2; set ftp:passive-mode true; mkdir -p \"$private_dir\"; put build/ittemmall-private/ittemmall-server-config.php -o \"$private_dir/ittemmall-server-config.php\"; chmod 600 \"$private_dir/ittemmall-server-config.php\"; bye"
