            return { index, src: images[index] };
          });
          return `
            <main class="has-detail-bottom">
              <section class="image-stage">
                <div class="main-image ${product.detailMediaClass || ""}" data-gallery-swipe aria-label="${escapeHtml(product.name)} 이미지 갤러리">
                  <div class="gallery-track">
                    ${gallerySlides
                      .map(
                        (slide) => `
                          <div class="gallery-slide" aria-hidden="${slide.index === selectedImageIndex ? "false" : "true"}">
                            <img src="${slide.src}" alt="${escapeHtml(product.name)} 이미지 ${slide.index + 1}" draggable="false" />
                          </div>
                        `,
                      )
                      .join("")}
                  </div>
                </div>
                <div class="thumb-grid ${Number(product.galleryThumbLimit || 5) === 6 ? "is-six" : ""}">
                  ${images
                    .slice(0, Number(product.galleryThumbLimit || 5))
                    .map(
                      (src, index) => `
                        <button
                          class="thumb ${index === selectedImageIndex ? "active" : ""}"
                          type="button"
                          data-action="select-image"
                          data-index="${index}"
                          aria-label="${escapeHtml(product.name)} 이미지 ${index + 1} 보기"
                        >
                          <img src="${src}" alt="${escapeHtml(product.name)} 썸네일 ${index + 1}" />
                        </button>
                      `,
                    )
                    .join("")}
                </div>
              </section>

              <section class="section-tight">
                <p class="eyebrow">${product.detailMode === "jewelry" ? "AQUA GLOW" : "PRODUCT DETAIL"}</p>
                <h1 class="detail-title">${escapeHtml(product.name)}</h1>
                <p class="detail-copy">${escapeHtml(product.longDescription)}</p>
                ${product.detailNotice ? `<p class="detail-notice">${escapeHtml(product.detailNotice)}</p>` : ""}
                <div class="price-row">
                  <p class="price" style="font-size:25px">₩ ${formatPrice(product.price)}</p>
                  ${
                    product.originalPrice
                      ? `<p class="original-price" style="font-size:14px">₩ ${formatPrice(product.originalPrice)}</p>`
                      : ""
                  }
                  ${
                    product.discountRate
                      ? `<span class="badge">${product.discountRate}%</span>`
                      : ""
                  }
                </div>
              </section>

              <section class="divider-section form-grid">
                <div class="option-group-grid">
                  ${product.options.map(renderOptionSelect).join("")}
                </div>
                ${
                  product.detailMode === "jewelry"
                    ? ""
                    : `
                      <div class="summary-card" style="margin-top:14px">
                        <p class="summary-meta">선택 총액</p>
                        <p class="summary-price">₩ ${formatPrice(getOrderTotal(product, state.quantity))}</p>
                      </div>
                    `
                }
                <div>
                  <p class="field-label">수량</p>
                  <div class="quantity-control" aria-label="수량 선택">
                    <button type="button" data-action="quantity-minus" aria-label="수량 줄이기">-</button>
                    <div class="quantity-value">${state.quantity}</div>
                    <button type="button" data-action="quantity-plus" aria-label="수량 늘리기">+</button>
                  </div>
                </div>
              </section>

              ${renderProductStory(product)}

              ${
                product.hideStandaloneInfo
                  ? ""
                  : `
                    <section class="divider-section">
                      <h2 style="margin:0;font-size:17px">상품 정보</h2>
                      <dl class="info-list">
                        ${(product.infoItems || product.detailInfo || [])
                          .map(
                            (item) => `
                              <div class="info-line">
                                <dt>${escapeHtml(item.label)}</dt>
                                <dd>${escapeHtml(item.value)}</dd>
                              </div>
                            `,
                          )
                          .join("")}
                      </dl>
                    </section>
                  `
              }

              ${product.detailMode === "jewelry" ? "" : renderTrustRow()}
              ${renderFooter()}
              ${renderDetailBottomBar()}
            </main>
          `;
        }

        function renderProductStory(product) {
          if (product.detailMode === "jewelry" && product.jewelryDetail) {
            return renderJewelryStory(product);
          }
          const detail = buildV6Detail(product);
          if (!detail) return "";
          const detailVisual = renderV6Visual("story-v6-detail", detail.detail, false);
          const placeDetailAfterProof = detail.detailPlacement === "afterProof";
          const fitClass =
            detail.imageFit === "contain"
              ? " story-v6-gallery-fit"
              : detail.imageFit === "portrait"
                ? " story-v6-portrait-fit"
                : "";
          const placementClass = detail.textPlacement === "below" ? " story-v6-text-below" : "";
          const proofThemeClass = detail.proofTheme === "blue" ? " story-v6-proof-blue" : "";
          return `
            <section class="story-v6${fitClass}${placementClass}${proofThemeClass}" aria-label="${escapeHtml(product.name)} 상세 본문">
              ${renderV6Visual("story-v6-hero", detail.hero, true)}
              ${renderV6SpecStrip(detail.specStrip)}
              ${
                detail.hideIntro
                  ? ""
                  : `
                    <section class="story-v6-intro">
                      <h2>${renderV6Title(detail.intro.titleLines)}</h2>
                      <p>${escapeHtml(safeV6CustomerText(detail.intro.copy))}</p>
                    </section>
                  `
              }
              ${renderV6Visual("story-v6-problem", detail.problem, false)}
              ${renderV6FeatureMain(detail.feature)}
              ${renderV6Proof(detail.proof)}
              ${placeDetailAfterProof ? detailVisual : ""}
              ${renderV6Benefit(detail.benefit)}
              ${placeDetailAfterProof ? "" : detailVisual}
              ${renderV6InfoSection(detail)}
              ${renderV6PolicyBlock(detail.policy)}
            </section>
          `;
        }

        function renderJewelryStory(product) {
          const detail = product.jewelryDetail || {};
          const paragraphs = cleanV6TextList(detail.paragraphs || []).slice(0, 3);
          const features = cleanV6TextList(detail.features || []).slice(0, 4);
          const accordions = (detail.accordions || [])
            .map((section) => ({
              title: compactV6Text(section.title || ""),
              copy: compactV6Text(section.copy || ""),
              rows: cleanV6InfoItems(section.rows || []),
            }))
            .filter((section) => section.title && (section.copy || section.rows.length));

          if (!paragraphs.length && !features.length && !accordions.length) return "";

          return `
            <section class="jewelry-story" aria-label="${escapeHtml(product.name)} 주얼리 상세 정보">
              <div class="jewelry-story-intro">
                <p class="jewelry-story-eyebrow">${escapeHtml(detail.eyebrow || "JEWELRY")}</p>
                <h2>${escapeHtml(detail.title || product.name)}</h2>
                ${
                  paragraphs.length
                    ? `<div class="jewelry-story-copy">${paragraphs.map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`).join("")}</div>`
                    : ""
                }
                ${
                  features.length
                    ? `<ul class="jewelry-story-features">${features.map((feature) => `<li>${escapeHtml(feature)}</li>`).join("")}</ul>`
                    : ""
                }
              </div>
              ${
                accordions.length
                  ? `
                    <div class="jewelry-accordions">
                      ${accordions
                        .map(
                          (section, index) => `
                            <details class="jewelry-accordion" ${index === 0 ? "open" : ""}>
                              <summary>${escapeHtml(section.title)}</summary>
                              <div class="jewelry-accordion-body">
                                ${
                                  section.rows.length
                                    ? `
                                      <dl class="jewelry-info-list">
                                        ${section.rows
                                          .map(
                                            (row) => `
                                              <div class="jewelry-info-row">
                                                <dt>${escapeHtml(row.label)}</dt>
                                                <dd>${escapeHtml(row.value)}</dd>
                                              </div>
                                            `,
                                          )
                                          .join("")}
                                      </dl>
                                    `
                                    : ""
                                }
                                ${section.copy ? `<p class="jewelry-accordion-copy">${escapeHtml(section.copy)}</p>` : ""}
                              </div>
                            </details>
                          `,
                        )
                        .join("")}
                    </div>
                  `
                  : ""
              }
            </section>
          `;
        }

        function buildV6Detail(product) {
          const story = product.story;
          if (!story) return null;
          const preset = productStoryV6Presets[product.slug] || product.v6Detail || story.v6Detail || {};
          const sections = story.sections || [];
          const images = product.images?.length ? product.images : [product.image];
          const brandImage = story.brandImages?.[0] || {};
          const featureImage = story.featureImage || {};
          const showcaseImage = story.showcaseImage || {};
          const problemSection = sections[0] || {};
          const featureSection = sections[1] || sections[0] || {};
          const useSection = sections[2] || sections[0] || {};
          const detailSection = sections[1] || sections[2] || {};
          const heroImage = preset.hero?.image || images[0] || product.image;
          const problemImage = preset.problem?.image || brandImage.src || images[1] || heroImage;
          const featureImageSrc = preset.feature?.image || showcaseImage.src || featureImage.src || images[2] || problemImage;
          const detailImageSrc = preset.detail?.image || featureImage.src || images[2] || featureImageSrc;
          const infoItems = cleanV6InfoItems(preset.info || story.specs || product.infoItems || product.detailInfo || []);

          return {
            story,
            imageFit: preset.imageFit || "",
            textPlacement: preset.textPlacement || "",
            hideIntro: preset.hideIntro === true,
            proofTheme: preset.proofTheme || "",
            detailPlacement: preset.detailPlacement || "",
            hero: {
              image: heroImage,
              alt: preset.hero?.alt || `${product.name} 제품 이미지`,
              imageFit: preset.hero?.imageFit || "",
              eyebrow: preset.hero?.eyebrow || cleanStoryEyebrow(product.categoryLabel || "PRODUCT", 0),
              titleLines: getV6TitleLines(preset.hero?.titleLines || story.heroTitleLines || [product.name]),
              lead: preset.hero?.lead || story.highlightCopy || product.longDescription,
              modelValue: preset.hero?.modelValue || product.cardTitle || product.name,
              modelText: preset.hero?.modelText || product.categoryLabel || "상품 상세",
            },
            specStrip: preset.specStrip || buildV6SpecStrip(product, story),
            intro: {
              titleLines: getV6TitleLines(preset.intro?.titleLines || story.introTitleLines || story.highlightEyebrow || product.shortDescription || product.name),
              copy: preset.intro?.copy || story.highlightCopy || product.longDescription,
            },
            problem: {
              image: problemImage,
              alt: preset.problem?.alt || brandImage.alt || `${product.name} 사용 장면`,
              eyebrow: preset.problem?.eyebrow || cleanStoryEyebrow(problemSection.eyebrow, 0),
              titleLines: getV6TitleLines(preset.problem?.titleLines || problemSection.title || story.highlightEyebrow || product.name),
              lead: preset.problem?.lead || paragraphsToCopy(problemSection.paragraphs, product.longDescription),
            },
            feature: {
              image: featureImageSrc,
              alt: preset.feature?.alt || showcaseImage.alt || featureImage.alt || `${product.name} 기능 이미지`,
              textPlacement: preset.feature?.textPlacement || "",
              eyebrow: preset.feature?.eyebrow || cleanStoryEyebrow(featureSection.eyebrow, 1),
              titleLines: getV6TitleLines(preset.feature?.titleLines || featureSection.title || story.highlightEyebrow || product.name),
              copy:
                preset.feature?.hideCopy === true
                  ? ""
                  : preset.feature?.copy || paragraphsToCopy(featureSection.paragraphs, story.highlightCopy || product.longDescription),
              points: normalizeV6Points(preset.feature?.points || story.highlights || []),
            },
            proof: normalizeV6Proof(preset.proof || story.proof || null),
            benefit: {
              image: preset.benefit?.image || preset.useScene?.image || images[1] || problemImage,
              alt: preset.benefit?.alt || preset.useScene?.alt || `${product.name} 사용 장면`,
              eyebrow: preset.benefit?.eyebrow || "USE SCENE",
              titleLines: getV6TitleLines(preset.benefit?.titleLines || useSection.title || "생활 속에 두기 좋은 제품"),
              copy: preset.benefit?.copy || paragraphsToCopy(useSection.paragraphs, product.longDescription),
              points: normalizeV6Points(preset.benefit?.points || story.recommendations || []),
            },
            detail: {
              image: detailImageSrc,
              alt: preset.detail?.alt || featureImage.alt || `${product.name} 디테일 이미지`,
              eyebrow: preset.detail?.eyebrow || cleanStoryEyebrow(detailSection.eyebrow, 2),
              titleLines: getV6TitleLines(preset.detail?.titleLines || detailSection.title || product.name),
              lead: preset.detail?.lead || paragraphsToCopy(detailSection.paragraphs, story.highlightCopy || product.longDescription),
            },
            infoTitle: preset.infoTitle || story.specTitle || "구매 전 확인할 제품 정보",
            infoCaption: preset.infoCaption || "색상, 구성, 사용 전 확인할 정보를 구매 전에 확인하세요.",
            infoItems,
            policy: normalizeV6Policy(preset.policy || story.policy || {}),
          };
        }

        function renderV6Visual(className, section, showModel) {
          if (!section?.image) return "";
          const imageFitClass = section.imageFit === "square" ? " story-v6-square-fit" : "";
          const noticeSafeClass = section.image.includes("-ai-v8") ? " story-v6-notice-safe" : "";
          return `
            <section class="story-v6-visual ${className}${imageFitClass}${noticeSafeClass}" aria-label="${escapeHtml(section.eyebrow || section.modelText || "상세 이미지")}">
              <img src="${escapeHtml(section.image)}" alt="${escapeHtml(section.alt || "상품 상세 이미지")}" />
              <div class="story-v6-copy">
                <p class="story-v6-eyebrow">${escapeHtml(section.eyebrow || "")}</p>
                <h2 class="story-v6-title">${renderV6Title(section.titleLines)}</h2>
                ${
                  safeV6CustomerText(section.lead)
                    ? `<p class="story-v6-lead">${escapeHtml(safeV6CustomerText(section.lead))}</p>`
                    : ""
                }
              </div>
              ${
                showModel
                  ? `<div class="story-v6-model"><b>${escapeHtml(section.modelValue || "")}</b><span>${escapeHtml(section.modelText || "")}</span></div>`
                  : ""
              }
            </section>
          `;
        }

        function renderV6SpecStrip(items) {
          const specs = cleanV6SpecStrip(items).slice(0, 5);
          if (!specs.length) return "";
          return `
            <section class="story-v6-spec-strip" aria-label="핵심 제품 정보">
              ${specs
                .map(
                  (item) => `
                    <div class="story-v6-spec">
                      <div class="story-v6-spec-inner">
                        <strong>${escapeHtml(item.value)}</strong>
                        <span>${escapeHtml(item.label)}</span>
                      </div>
                    </div>
                  `,
                )
                .join("")}
            </section>
          `;
        }

        function renderV6Feature(feature) {
          if (!feature) return "";
          return `
            <section class="story-v6-feature" aria-label="${escapeHtml(feature.eyebrow || "제품 기능")}">
              <div class="story-v6-feature-text">
                <p class="story-v6-eyebrow" style="color:#6f816f">${escapeHtml(feature.eyebrow || "")}</p>
                <h2>${renderV6Title(feature.titleLines)}</h2>
                <p>${escapeHtml(safeV6CustomerText(feature.copy))}</p>
                ${
                  feature.points?.length
                    ? `
                      <div class="story-v6-points">
                        ${feature.points
                          .slice(0, 3)
                          .map(
                            (point) => `
                              <div class="story-v6-point">
                                <strong>${escapeHtml(point.title)}</strong>
                                <span>${escapeHtml(point.caption || "")}</span>
                              </div>
                            `,
                          )
                          .join("")}
                      </div>
                    `
                    : ""
                }
              </div>
              ${
                feature.image
                  ? `
                    <div class="story-v6-feature-image">
                      <img src="${escapeHtml(feature.image)}" alt="${escapeHtml(feature.alt || "제품 기능 이미지")}" />
                    </div>
                  `
                  : ""
              }
            </section>
          `;
        }

        function renderV6FeatureMain(feature) {
          if (!feature?.image) return "";
          const placementClass =
            feature.textPlacement === "below"
              ? " story-v6-copy-below"
              : feature.textPlacement === "overlay-top-left"
                ? " story-v6-overlay-top-left"
                : feature.textPlacement === "overlay-top"
                  ? " story-v6-copy-top"
                : "";
          return renderV6Visual(
            `story-v6-feature-main${placementClass}`,
            {
              ...feature,
              lead: feature.lead || feature.copy || "",
            },
            false,
          );
        }

        function renderV6Proof(proof) {
          if (!proof?.items?.length) return "";
          return `
            <section class="story-v6-proof" aria-label="${escapeHtml(proof.eyebrow || "기능 근거")}">
              <div class="story-v6-proof-head">
                <p class="story-v6-eyebrow">${escapeHtml(proof.eyebrow || "")}</p>
                <h2>${renderV6Title(proof.titleLines)}</h2>
                ${safeV6CustomerText(proof.copy) ? `<p>${escapeHtml(safeV6CustomerText(proof.copy))}</p>` : ""}
              </div>
              <div class="story-v6-proof-list">
                ${proof.items
                  .map(
                    (item, index) => `
                      <div class="story-v6-proof-card">
                        <div class="story-v6-proof-card-text">
                          <b class="story-v6-proof-number">${String(index + 1).padStart(2, "0")}</b>
                          <div>
                            <strong>${escapeHtml(item.title)}</strong>
                            <span>${escapeHtml(item.caption || "")}</span>
                          </div>
                        </div>
                        <div class="story-v6-proof-icon">${
                          item.iconImage
                            ? `<img src="${escapeHtml(item.iconImage)}" alt="" loading="lazy" decoding="async" />`
                            : icon(item.icon || "info", 46)
                        }</div>
                      </div>
                    `,
                  )
                  .join("")}
              </div>
            </section>
          `;
        }

        function renderV6Benefit(benefit) {
          if (!benefit?.image) return "";
          const points = normalizeV6Points(benefit.points || []).slice(0, 3);
          const noticeSafeClass = benefit.image.includes("-ai-v8") ? " story-v6-benefit-notice-safe" : "";
          return `
            <section class="story-v6-benefit${noticeSafeClass}" aria-label="${escapeHtml(benefit.eyebrow || "생활 장점")}">
              <div class="story-v6-benefit-image">
                <img src="${escapeHtml(benefit.image)}" alt="${escapeHtml(benefit.alt || "상품 사용 장면")}" />
              </div>
              <div class="story-v6-benefit-text">
                <p class="story-v6-eyebrow" style="color:#6f816f">${escapeHtml(benefit.eyebrow || "")}</p>
                <h2>${renderV6Title(benefit.titleLines)}</h2>
                <p>${escapeHtml(safeV6CustomerText(benefit.copy))}</p>
                ${
                  points.length
                    ? `
                      <div class="story-v6-benefit-points">
                        ${points
                          .map(
                            (point) => `
                              <div class="story-v6-benefit-point">
                                <strong>${escapeHtml(point.title)}</strong>
                                <span>${escapeHtml(point.caption || "")}</span>
                              </div>
                            `,
                          )
                          .join("")}
                      </div>
                    `
                    : ""
                }
              </div>
            </section>
          `;
        }

        function renderV6InfoSection(detail) {
          const items = cleanV6InfoItems(detail.infoItems || []).slice(0, 10);
          const sizeGuide = renderSizeGuide(detail.story);
          if (!items.length && !sizeGuide) return "";
          return `
            <section class="story-v6-info-section" aria-label="구매 전 정보">
              <h2>${escapeHtml(detail.infoTitle)}</h2>
              <p>${escapeHtml(safeV6CustomerText(detail.infoCaption))}</p>
              ${sizeGuide}
              ${
                items.length
                  ? `
                    <div class="story-v6-info-grid">
                      ${items
                        .map(
                          (item) => `
                            <div class="story-v6-info">
                              <span>${escapeHtml(item.label)}</span>
                              <strong>${escapeHtml(item.value)}</strong>
                            </div>
                          `,
                        )
                        .join("")}
                    </div>
                  `
                  : ""
              }
            </section>
          `;
        }

        function renderV6PolicyBlock(policy) {
          const normalized = normalizeV6Policy(policy);
          if (!normalized.items.length) return "";
          return `
            <section class="story-v6-policy" aria-label="배송과 교환 반품 안내">
              <h2>${renderV6Title(normalized.titleLines)}</h2>
              <p>${escapeHtml(safeV6CustomerText(normalized.caption))}</p>
              <div class="story-v6-policy-grid">
                ${normalized.items
                  .map(
                    (item) => `
                      <div class="story-v6-policy-item">
                        <strong>${escapeHtml(item.title)}</strong>
                        <p>${escapeHtml(item.copy)}</p>
                      </div>
                    `,
                  )
                  .join("")}
              </div>
              ${safeV6CustomerText(normalized.caution) ? `<p class="story-v6-policy-caution">${escapeHtml(safeV6CustomerText(normalized.caution))}</p>` : ""}
            </section>
          `;
        }

        function renderV6Title(lines) {
          return getV6TitleLines(lines).map((line) => escapeHtml(line)).join("<br>");
        }

        function getV6TitleLines(value) {
          if (Array.isArray(value)) {
            const lines = value.map((line) => compactV6Text(line)).filter(Boolean);
            return lines.length ? lines.slice(0, 4) : [""];
          }
          const text = compactV6Text(value);
          if (!text) return [""];
          return text.split(/\s*<br\s*\/?>\s*|\n+/i).map((line) => compactV6Text(line)).filter(Boolean).slice(0, 4);
        }

        function buildV6SpecStrip(product, story) {
          const info = cleanV6InfoItems(product.infoItems || story.specs || product.detailInfo || []);
          const compactInfo = info.filter((item) => !/제품명|상품명/i.test(item.label)).slice(0, 5);
          if (compactInfo.length) {
            return compactInfo.map((item) => ({ value: item.value, label: item.label }));
          }
          return cleanV6TextList(story.highlights || []).slice(0, 5).map((item, index) => ({
            value: item,
            label: `POINT ${String(index + 1).padStart(2, "0")}`,
          }));
        }

        function normalizeV6Points(items) {
          return (items || [])
            .map((item) => {
              if (typeof item === "string") return { title: item, caption: "" };
              return { title: item.title || item.value || "", caption: item.caption || item.label || "" };
            })
            .filter((item) => item.title && !hasBlockedCustomerText(`${item.title} ${item.caption}`));
        }

        function normalizeV6Proof(proof) {
          if (!proof) return null;
          const items = (proof.items || [])
            .map((item) => ({
              icon: compactV6Text(item.icon || "info"),
              iconImage: compactV6Text(item.iconImage || ""),
              title: compactV6Text(item.title || item.value || ""),
              caption: compactV6Text(item.caption || item.copy || item.label || ""),
            }))
            .filter((item) => item.title && item.caption && !hasBlockedCustomerText(`${item.title} ${item.caption}`));

          if (!items.length) return null;
          return {
            eyebrow: compactV6Text(proof.eyebrow || "STRUCTURE CHECK"),
            titleLines: getV6TitleLines(proof.titleLines || proof.title || "구조를 확인하세요"),
            copy: compactV6Text(proof.copy || proof.caption || ""),
            items,
          };
        }

        function normalizeV6Policy(policy) {
          const defaultItems = [
            { title: "배송 안내", copy: "결제 확인 후 상품별 출고 일정에 따라 순차 발송됩니다. 지역과 수량에 따라 배송비와 도착 일정이 달라질 수 있습니다." },
            { title: "교환 / 반품", copy: "상품 수령 후 구성품과 외관을 먼저 확인해 주세요. 사용 흔적, 구성품 누락, 포장 훼손이 있으면 교환이나 반품이 제한될 수 있습니다." },
            { title: "문의 안내", copy: "상품 이상이나 배송 문의는 주문 정보와 사진을 함께 남겨 주세요. 확인 후 안내에 따라 처리됩니다." },
          ];
          const sourceItems = Array.isArray(policy?.items) && policy.items.length ? policy.items : defaultItems;
          const items = sourceItems
            .map((item) => ({
              title: compactV6Text(item.title || item.label || ""),
              copy: compactV6Text(item.copy || item.caption || item.description || ""),
            }))
            .filter((item) => item.title && item.copy && !hasBlockedCustomerText(`${item.title} ${item.copy}`));

          return {
            titleLines: getV6TitleLines(policy?.titleLines || policy?.title || "배송 / 교환 / 반품 안내"),
            caption: compactV6Text(policy?.caption || "주문 전후에 확인해야 할 기본 안내입니다."),
            items,
            caution: compactV6Text(policy?.caution || ""),
          };
        }

        function cleanV6SpecStrip(items) {
          return (items || [])
            .map((item) => ({ value: compactV6Text(item.value || item.title || ""), label: compactV6Text(item.label || item.caption || "") }))
            .filter((item) => item.value && item.label && !hasBlockedCustomerText(`${item.value} ${item.label}`));
        }

        function cleanV6InfoItems(items) {
          return (items || [])
            .map((item) => ({ label: compactV6Text(item.label || ""), value: compactV6Text(item.value || "") }))
            .filter((item) => item.label && item.value && !hasBlockedCustomerText(`${item.label} ${item.value}`));
        }

        function cleanV6TextList(items) {
          return (items || []).map(compactV6Text).filter((item) => item && !hasBlockedCustomerText(item));
        }

        function cleanStoryEyebrow(value, index) {
          const text = compactV6Text(value);
          const map = {
            "공감 장면": "DAILY SCENE",
            "상품 특이점": "PRODUCT DETAIL",
            "사용 루틴": "HOW TO USE",
            "구성": "PACKAGE",
            "선택": "OPTION",
            "관리": "CARE",
            "소재": "MATERIAL",
          };
          if (map[text]) return map[text];
          if (/^포인트\s*\d+/i.test(text)) return `FEATURE ${String(index + 1).padStart(2, "0")}`;
          return text || "PRODUCT DETAIL";
        }

        function paragraphsToCopy(paragraphs, fallback) {
          const copy = cleanV6TextList(paragraphs || []).join(" ");
          return copy || compactV6Text(fallback);
        }

        function compactV6Text(value) {
          return String(value || "").replace(/\s+/g, " ").trim();
        }

        function safeV6CustomerText(value) {
          const text = compactV6Text(value);
          return hasBlockedCustomerText(text) ? "" : text;
        }

        function hasBlockedCustomerText(value) {
          return /(원본 상세페이지|타겟 상세페이지|소스 이미지|source evidence|프롬프트|생성했습니다|참고했습니다|확인됩니다|확인했습니다|확인되는|표기되어|상세정보에서|구성이 확인|확인되는 구조|한 장면으로 정리|근거로 작성|제작자 설명|제작 과정|내부 설명|보여주는 편|장점\s*4가지|체크\s*포인트|쓰기 전에|이 네 가지를 보세요|테스트|조건부|검증|반응 확인|구매 의향|클릭 의도|클릭값|페이크도어|실험|테스트몰|테스트 상품|판매 테스트|실제 결제가 아닙니다|확인 필요|test|trial|validation|experiment|mvp)/i.test(String(value || ""));
        }

        function renderColorOption(option, selectedValue) {
          return `
            <div class="option-field">
              <span class="field-label">${escapeHtml(option.label)}</span>
              <div class="color-swatch-row">
                ${option.values
                  .map(
                    (item) => `
                      <button

                        type="button"
                        data-action="select-option"
                        data-option-label="${escapeHtml(option.label)}"
                        data-option-value="${escapeHtml(item)}"
                        style="--swatch-color:${escapeHtml(getColorSwatch(item))}"
                        aria-label="${escapeHtml(item)} 색상 선택"
                        aria-pressed="${item === selectedValue ? "true" : "false"}"
                      >
                        <span class="color-swatch-dot" aria-hidden="true"></span>
                        <span>${escapeHtml(item)}</span>
                      </button>
                    `,
                  )
                  .join("")}
              </div>
            </div>

        function renderTypeOption(option, selectedValue) {
          return `
            <div class="option-field">
              <span class="field-label">${escapeHtml(option.label)}</span>
              <div class="type-value">${escapeHtml(selectedValue)}</div>

        function renderOptionButton(label, value, selected) {
          const tone = getOptionTone(value);
          return `
            <button
              class="option-button ${tone ? `tone-${tone}` : ""} ${selected ? "is-selected" : ""}"
              type="button"
              data-action="select-option"
              data-option-label="${escapeHtml(label)}"
              data-option-value="${escapeHtml(value)}"
              aria-pressed="${selected ? "true" : "false"}"
            >
              <span>${escapeHtml(formatOptionLabel(value))}</span>
              ${selected ? `<span class="option-check">${icon("check", 20)}</span>` : ""}
            </button>
          `;
        }

        function getOptionTone(value) {
          const normalized = String(value).trim().toLowerCase();
          if (["black", "블랙", "charcoal", "차콜"].includes(normalized)) return "black";
          if (["white", "화이트"].includes(normalized)) return "white";
          if (["gray", "grey", "그레이"].includes(normalized)) return "gray";
          if (["pink", "핑크"].includes(normalized)) return "pink";
          return "";
        }

        function getColorSwatch(value) {
          const normalized = String(value).trim().toLowerCase();
          if (["pink", "핑크"].includes(normalized)) return "#e5bcc0";
          if (["black", "블랙"].includes(normalized)) return "#111111";
          if (["charcoal", "차콜"].includes(normalized)) return "#2f3437";
          if (["white", "화이트"].includes(normalized)) return "#ffffff";
          if (["silver", "실버"].includes(normalized)) return "linear-gradient(135deg, #f8fafc 0%, #cbd5e1 48%, #f1f5f9 100%)";
          if (["gray", "grey", "그레이"].includes(normalized)) return "#d4d4d8";
          if (["skyblue", "sky blue", "하늘색", "아이스블루", "아이스불루"].includes(normalized)) return "#BFE7F6";
          if (["lavender", "라벤더"].includes(normalized)) return "#D8C7F2";
          if (["deepblue", "deep blue", "딥블루"].includes(normalized)) return "#243C72";
          if (["green", "그린"].includes(normalized)) return "#8BC78C";
          return "#e5bcc0";
        }

        function formatOptionLabel(value) {
          const normalized = String(value).trim().toLowerCase();
          if (normalized === "블랙") return "BLACK";
          if (normalized === "화이트") return "WHITE";
          if (normalized === "그레이") return "GRAY";
          if (normalized === "차콜") return "CHARCOAL";
          if (normalized === "핑크") return "핑크";
          return value;
        }

          `;
        }

        function renderCompletePage() {
          const submission = readJson(storageKeys.submissions, []).find(
            (item) => item.id === state.lastSubmissionId,
          );
          if (!submission) {
            return `
              <main>
                <section class="section">
                  <div class="state-card">
                    <h2>주문 완료 내역을 찾지 못했습니다.</h2>
                    <p>저장된 주문 내역에서 다시 확인하거나 상품 목록으로 돌아갈 수 있습니다.</p>
                    <div class="button-row">
                      <button class="btn primary" type="button" data-action="history">주문 내역</button>
                      <button class="btn" type="button" data-action="home">상품 보기</button>
                    </div>
                  </div>
                </section>
                ${renderFooter()}
              </main>
            `;
          }

          return `
            <main>
              <section class="complete-wrap">
                <div class="complete-icon">${icon("check", 40)}</div>
                <div class="complete-text">
                  <h1>${state.completeMode === "edit" ? "주문 수정이 완료되었습니다." : "주문 접수가 완료되었습니다."}</h1>
                  <p>구매 가능 일정과 결제 안내를<br />입력하신 연락처로 안내드리겠습니다.</p>
                </div>
                <div style="margin-top:28px">
                  ${renderSubmissionSummary(submission)}
                </div>
                <div class="button-row" style="margin-top:18px">
                  <button class="btn primary" type="button" data-action="history">주문 내역 보기</button>
                  <button class="btn" type="button" data-action="select-product-from-origin" data-id="${submission.productId}">상품 다시 보기</button>
                </div>
                <div class="button-row one" style="margin-top:10px">
                  <button class="btn ghost" type="button" data-action="home">다른 상품 보기</button>
                </div>
              </section>
              ${renderFooter()}
            </main>
          `;
        }

        function renderSubmissionSummary(submission) {
          return `
            <section class="summary-card">
              <div class="summary-flex">
                <div class="summary-image">
                  <img src="${submission.productImage}" alt="${escapeHtml(submission.productName)}" />
                </div>
                <dl class="detail-dl" style="flex:1">
                  <dt>상품명</dt>
                  <dd>${escapeHtml(submission.productName)}</dd>
                  ${Object.entries(submission.selectedOptions || {})
                    .map(
                      ([label, value]) => `
                        <dt>${escapeHtml(label)}</dt>
                        <dd>${escapeHtml(value)}</dd>
                      `,
                    )
                    .join("")}
                  <dt>수량</dt>
                  <dd>${submission.quantity}개</dd>
                  ${
                    submission.extraFee
                      ? `
                        <dt>${escapeHtml(submission.extraFeeLabel || "추가 비용")}</dt>
                        <dd>₩ ${formatPrice(submission.extraFee)}</dd>
                      `
                      : ""
                  }
                  ${
                    submission.addOnTotal
                      ? `
                        <dt>추가상품 금액</dt>
                        <dd>₩ ${formatPrice(submission.addOnTotal)}</dd>
                      `
                      : ""
                  }
                  <dt>주문 금액</dt>
                  <dd>₩ ${formatPrice(submission.amount)}</dd>
                  <dt>결제수단</dt>
                  <dd>${escapeHtml(formatPaymentMethod(submission.paymentMethod))}</dd>
                  <dt>상태</dt>
                  <dd>${escapeHtml(formatSubmissionStatus(submission.status || submission.paymentStatus))}</dd>
                  <dt>연락처</dt>
                  <dd>${escapeHtml(maskPhone(submission.customer?.phone))}</dd>
                </dl>
              </div>
            </section>
          `;
        }

        function renderHistoryPage() {
          return `
            <main>
              <section class="section">
                <div class="section-heading">
                  <div>
                    <p class="eyebrow">HISTORY</p>
                    <h2>주문 내역</h2>
                  </div>
                  <button class="link-button" type="button" data-action="clear-local-data">저장값 초기화</button>
                </div>
                ${renderHistoryState()}
              </section>
              ${renderFooter()}
            </main>
          `;
        }

        function renderHistoryState() {
          if (historyView.status === "loading" || historyView.status === "idle") {
            return `
              <div class="state-card">
                <h2>주문 내역을 불러오는 중입니다.</h2>
                <p>이 브라우저에 저장된 주문 데이터를 확인하고 있어요.</p>
                <div class="skeleton" aria-hidden="true">
                  <div class="skeleton-line"></div>
                  <div class="skeleton-line" style="width:78%;margin:0 auto"></div>
                  <div class="skeleton-line" style="width:54%;margin:0 auto"></div>
                </div>
              </div>
            `;
          }

          if (historyView.status === "error") {
            return `
              <div class="state-card">
                <h2>내역을 불러오지 못했습니다.</h2>
                <p>${escapeHtml(historyView.error)} 저장 데이터를 초기화하거나 다시 불러올 수 있습니다.</p>
                <div class="button-row">
                  <button class="btn primary" type="button" data-action="retry-history">다시 불러오기</button>
                  <button class="btn" type="button" data-action="home">상품 보기</button>
                </div>
              </div>
            `;
          }

          if (historyView.status === "empty") {
            return `
              <div class="state-card">
                <h2>아직 주문 내역이 없습니다.</h2>
                <p>상품 상세에서 주문서를 접수하면 이곳에 내역이 쌓이고 새로고침 후에도 남습니다.</p>
                <div class="button-row">
                  <button class="btn primary" type="button" data-action="select-product" data-id="${representativeProduct().id}">대표 상품 보기</button>
                  <button class="btn" type="button" data-action="home">상품 목록</button>
                </div>
                ${
                  hasDraft()
                    ? `<div class="button-row one" style="margin-top:10px"><button class="btn warning" type="button" data-action="resume-draft">작성 중 주문서 이어가기</button></div>`
                    : ""
                }
              </div>
            `;
          }

          return `
            <div class="origin-card">
              <p>주문 내역은 이 브라우저의 LocalStorage에 저장됩니다. 상세에서 수정하거나 상품으로 돌아갈 수 있어요.</p>
              <div class="button-row">
                <button class="btn primary" type="button" data-action="home">상품 더 보기</button>
                ${
                  hasDraft()
                    ? `<button class="btn warning" type="button" data-action="resume-draft">주문서 작성 이어가기</button>`
                    : `<button class="btn" type="button" data-action="select-product" data-id="${representativeProduct().id}">대표 상품 보기</button>`
                }
              </div>
            </div>
            <div class="history-list">
              ${historyView.items.map(renderSubmissionCard).join("")}
            </div>
          `;
        }

        function renderSubmissionCard(submission) {
          return `
            <article class="submission-card">
              <button type="button" data-action="view-submission" data-id="${submission.id}">
                <div class="submission-top">
                  <div class="submission-thumb">
                    <img src="${submission.productImage}" alt="${escapeHtml(submission.productName)}" />
                  </div>
                  <div style="min-width:0;flex:1">
                    <p class="submission-name">${escapeHtml(submission.productName)}</p>
                    <p class="submission-meta">
                      ${escapeHtml(submission.id)}<br />
                      ${formatDate(submission.updatedAt)} · ₩ ${formatPrice(submission.amount)}
                      <br />${escapeHtml(formatPaymentMethod(submission.paymentMethod))}
                    </p>
                    <span class="status-pill">${escapeHtml(formatSubmissionStatus(submission.status || submission.paymentStatus))}</span>
                  </div>
                </div>
              </button>
            </article>
          `;
        }

        function renderSubmissionDetailPage() {
          const submission = readJson(storageKeys.submissions, []).find(
            (item) => item.id === state.viewSubmissionId,
          );

          if (!submission) {
            return `
              <main>
                <section class="section">
                  <div class="state-card">
                    <h2>주문 상세를 찾지 못했습니다.</h2>
                    <p>내역이 삭제되었거나 다른 브라우저에 저장된 주문일 수 있습니다.</p>
                    <div class="button-row">
                      <button class="btn primary" type="button" data-action="history">주문 내역</button>
                      <button class="btn" type="button" data-action="home">상품 보기</button>
                    </div>
                  </div>
                </section>
                ${renderFooter()}
              </main>
            `;
          }

          return `
            <main>
              <section class="section">
                ${renderOriginCard("상세 확인 후 수정하거나 상품으로 돌아갈 수 있습니다.", "history", "내역으로", "home", "상품 목록")}
                ${renderSubmissionSummary(submission)}
                <section class="summary-card" style="margin-top:12px">
                  <dl class="detail-dl">
                    <dt>주문번호</dt>
                    <dd>${escapeHtml(submission.id)}</dd>
                    <dt>상태</dt>
                    <dd>${escapeHtml(formatSubmissionStatus(submission.status || submission.paymentStatus))}</dd>
                    <dt>결제수단</dt>
                    <dd>${escapeHtml(formatPaymentMethod(submission.paymentMethod))}</dd>
                    <dt>주문자</dt>
                    <dd>${escapeHtml(submission.customer?.name || "-")}</dd>
                    <dt>이메일</dt>
                    <dd>${escapeHtml(submission.customer?.email || "-")}</dd>
                    <dt>${escapeHtml(siteConfig.fulfillmentPrimaryLabel)}</dt>
                    <dd>${escapeHtml(submission.customer?.fulfillmentPrimary || submission.customer?.address || "-")}</dd>
                    <dt>요청사항</dt>
                    <dd>${escapeHtml(submission.customer?.request || "-")}</dd>
                    <dt>저장 시각</dt>
                    <dd>${formatDate(submission.updatedAt)}</dd>
                  </dl>
                </section>
                <div class="button-row" style="margin-top:14px">
                  <button class="btn primary" type="button" data-action="edit-submission" data-id="${submission.id}">주문 정보 수정</button>
                  <button class="btn" type="button" data-action="select-product-from-origin" data-id="${submission.productId}">상품 다시 보기</button>
                </div>
              </section>
              ${renderFooter()}
            </main>
          `;
        }

        function renderTrustRow() {
          const items = [
            { icon: "package", title: "상품 확인", desc: "상세 정보 제공" },
            { icon: "shield", title: "주문 정보", desc: "안전하게 입력" },
            { icon: "headphones", title: "고객 안내", desc: "연락처로 안내" },
          ];
          return `
            <section class="trust-row">
              ${items
                .map(
                  (item) => `
                    <div class="trust-item">
                      ${icon(item.icon, 18)}
                      <p class="trust-title">${escapeHtml(item.title)}</p>
                      <p class="trust-desc">${escapeHtml(item.desc)}</p>
                    </div>
                  `,
                )
                .join("")}
            </section>
          `;
        }

        function renderFooter() {
          const footerLinks = [
            { label: "고객센터", href: "#/info/support" },
            { label: "사업자 정보", href: "./legal/business.html" },
            { label: "이용약관", href: "./legal/terms.html" },
            { label: "개인정보처리방침", href: "./legal/privacy.html" },
            { label: "주문 조회", href: "./payment/order-lookup.html" },
          ];
          const legal = siteConfig.legalInfo;
          return `
            <footer class="footer">
              <div class="footer-links">
                ${footerLinks.map((link) => `<a href="${escapeHtml(link.href)}">${escapeHtml(link.label)}</a>`).join("")}
              </div>
              <div class="footer-business" aria-label="사업자 정보">
                <p>상호: ${escapeHtml(legal.companyName)} · 대표자: ${escapeHtml(legal.representative)}</p>
                <p>사업자등록번호: ${escapeHtml(legal.businessRegistrationNumber)}</p>
                <p>통신판매업 신고번호: ${escapeHtml(legal.ecommerceLicense)}</p>
                <p>주소: ${escapeHtml(legal.businessAddress)}</p>
                <p>고객센터: ${escapeHtml(legal.customerCenter)} · ${escapeHtml(legal.email)}</p>
              </div>
              <p class="footer-copy">© 2026 ${escapeHtml(siteConfig.brandName)}. All rights reserved.</p>
            </footer>
          `;
        }

        function icon(name, size = 22) {
          const attrs = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"`;
          const paths = {
            "arrow-left": '<path d="m15 18-6-6 6-6"/><path d="M21 12H9"/>',
            menu: '<path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/>',
            search: '<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>',
            check: '<path d="M20 6 9 17l-5-5"/>',
            list: '<path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/>',
            info: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
            refresh: '<path d="M3 12a9 9 0 0 1 15.5-6.2L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.2L3 16"/><path d="M3 21v-5h5"/>',
            headphones: '<path d="M3 14h3a2 2 0 0 1 2 2v3H6a3 3 0 0 1-3-3v-2Z"/><path d="M21 14h-3a2 2 0 0 0-2 2v3h2a3 3 0 0 0 3-3v-2Z"/><path d="M3 14v-2a9 9 0 0 1 18 0v2"/>',
            package: '<path d="m7.5 4.3 9 5.2"/><path d="M21 8.5 12 14 3 8.5"/><path d="M12 22V14"/><path d="M3 8.5v7L12 21l9-5.5v-7L12 3 3 8.5Z"/>',
            truck:
              '<path d="M10 17h4V5H2v12h3"/><path d="M14 17h1"/><path d="M14 8h4l4 4v5h-3"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>',
            shield:
              '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/>',
            lock:
              '<rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
            light:
              '<path d="M9 18h6"/><path d="M10 22h4"/><path d="M8.5 14.5a5.5 5.5 0 1 1 7 0c-.9.8-1.5 1.7-1.5 3.5h-4c0-1.8-.6-2.7-1.5-3.5Z"/><path d="M4 12H2"/><path d="M22 12h-2"/><path d="m5 5-1.4-1.4"/><path d="m20.4 3.6-1.4 1.4"/>',
            airflow:
              '<path d="M4 8h9a3 3 0 1 0-3-3"/><path d="M4 13h13a3 3 0 1 1-3 3"/><path d="M4 18h7"/><path d="M12 3v18"/><path d="m8 17 4 4 4-4"/>',
            trap:
              '<path d="M7 5h10"/><path d="M6 8h12l-1.2 11H7.2L6 8Z"/><path d="M9 11v5"/><path d="M12 11v5"/><path d="M15 11v5"/><path d="m8 5 1.5-3h5L16 5"/>',
            clean:
              '<path d="M7 4h10"/><path d="M9 4v15a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2V4"/><path d="M6 8h12"/><path d="M10 12h4"/><path d="M10 16h4"/><path d="m4 20 2-2"/><path d="m20 20-2-2"/>',
            grille:
              '<rect x="5" y="4" width="14" height="16" rx="3"/><path d="M9 7v10"/><path d="M12 7v10"/><path d="M15 7v10"/>',
            zap:
              '<path d="M13 2 5 14h6l-1 8 9-13h-6V2Z"/><path d="M4 5l1.5 1.5"/><path d="M20 18l-1.5-1.5"/>',
            power:
              '<circle cx="12" cy="12" r="7"/><path d="M12 7v5"/><path d="M8.5 15.5a5 5 0 0 0 7 0"/>',
            "chevron-down": '<path d="m6 9 6 6 6-6"/>',
            "chevron-right": '<path d="m9 18 6-6-6-6"/>',
            x: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
          };
          return `<svg ${attrs}>${paths[name] || ""}</svg>`;
        }
      })();
    </script>
  </body>
</html>
