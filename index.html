    <style>
      :root {
        --bg: #ffffff;
        --paper: #ffffff;
        --ink: #111111;
        --brand: #111111;
        --brand-light: #d4d4d8;
        --muted: #666666;
        --line: #e4e4e7;
        --soft: #f7f7f7;
        --accent: var(--brand);
        --accent-2: #525252;
        --on-brand: #ffffff;
        --header-bg: #ffffff;
        --header-text: #111111;
        --header-border: #e4e4e7;
        --danger: #b91c1c;
        --shadow: 0 24px 60px rgba(17, 17, 17, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: auto;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      img {
        display: block;
        max-width: 100%;
      }

      .phone-shell {
        width: min(100%, 430px);
        min-height: 100vh;
        margin: 0 auto;
        background: var(--paper);
        box-shadow: 0 0 0 1px rgba(17, 17, 17, 0.08);
      }

      .app-header {
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 1px solid var(--header-border, var(--brand));
        background: var(--header-bg, var(--brand));
        color: var(--header-text, var(--on-brand));
        backdrop-filter: blur(14px);
      }

      .header-inner {
        display: flex;
        height: 56px;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
      }

      .icon-button {
        display: inline-flex;
        position: relative;
        z-index: 2;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: inherit;
      }

      .icon-button:active,
      .icon-button:focus-visible {
        background: rgba(255, 255, 255, 0.12);
        outline: 2px solid transparent;
      }

      .brand-button {
        min-width: 0;
        border: 0;
        background: transparent;
        color: inherit;
        text-align: center;
      }

      .brand-logo {
        margin: 0;
        color: var(--on-brand);
        font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 0.39em;
        line-height: 1;
        text-indent: 0.39em;
      }

      .app-header .brand-logo {
        color: inherit;
      }

      .page-title {
        margin: 2px 0 0;
        font-size: 10px;
        font-weight: 700;
        color: var(--muted);
      }

      .app-header .page-title {
        color: rgba(255, 255, 255, 0.76);
      }

      main {
        min-height: calc(100vh - 56px);
      }

      .section {
        padding: 20px 16px;
      }

      .section-tight {
        padding: 14px 16px;
      }

      .hero {
        position: relative;
        min-height: 340px;
        overflow: hidden;
        border: 1px solid var(--brand);
        border-radius: 8px;
        background: #101010;
        color: white;
      }

      .hero img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.82;
      }

      .hero::after {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.34), rgba(0, 0, 0, 0.72));
        content: "";
      }

      .hero-content {
        position: relative;
        z-index: 1;
        display: flex;
        min-height: 340px;
        flex-direction: column;
        justify-content: space-between;
        padding: 26px;
      }

      .eyebrow {
        margin: 0;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.22em;
        color: var(--muted);
      }

      .hero .eyebrow {
        color: rgba(255, 255, 255, 0.72);
      }

      h1,
      h2,
      h3,
      p {
        overflow-wrap: break-word;
      }

      .hero h1 {
        max-width: 100%;
        margin: 14px 0 0;
        font-size: 28px;
        line-height: 1.18;
        letter-spacing: 0;
        word-break: keep-all;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.28);
      }

      .hero-copy {
        max-width: 100%;
        margin: 12px 0 0;
        color: rgba(255, 255, 255, 0.84);
        font-size: 14px;
        line-height: 1.7;
        word-break: keep-all;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.24);
      }

      .hero-actions,
      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .button-row.one {
        grid-template-columns: 1fr;
      }

      .btn {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--brand);
        border-radius: 8px;
        padding: 12px 14px;
        background: var(--paper);
        color: var(--brand);
        font-size: 14px;
        font-weight: 900;
        text-align: center;
        text-decoration: none;
      }

      .btn.primary {
        border-color: var(--brand);
        background: var(--brand);
        color: var(--on-brand);
      }

      .btn.accent {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }

      .btn.ghost {
        border-color: var(--line);
        background: var(--soft);
      }

      .product-actions .btn.ghost {
        border-color: var(--brand);
        background: var(--brand);
        color: var(--on-brand);
      }

      .btn.warning {
        border-color: #fcd34d;
        background: #fffbeb;
        color: #854d0e;
      }

      .btn:disabled {
        border-color: #d4d4d8;
        background: #d4d4d8;
        color: white;
      }

      .section-heading {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
      }

      .section-heading h2 {
        margin: 4px 0 0;
        font-size: 21px;
        line-height: 1.25;
      }

      .link-button {
        border: 0;
        background: transparent;
        color: var(--accent);
        font-size: 12px;
        font-weight: 900;
        text-decoration: none;
      }

      .search-box {
        margin-bottom: 12px;
      }

      .category-strip {
        display: flex;
        gap: 8px;
        margin: 12px -16px 14px;
        overflow-x: auto;
        padding: 0 16px 2px;
        scrollbar-width: none;
      }

      .category-strip::-webkit-scrollbar {
        display: none;
      }

      .category-chip {
        display: inline-flex;
        min-height: 38px;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: white;
        color: #27272a;
        padding: 0 13px;
        font-size: 12px;
        font-weight: 900;
      }

      .category-chip.is-active {
        border-color: var(--brand);
        background: var(--brand);
        color: var(--on-brand);
      }

      .field-shell {
        position: relative;
      }

      .field-shell svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
      }

      .search-input,
      .input,
      .select,
      .textarea {
        width: 100%;
        min-height: 48px;
        border: 1px solid #d4d4d8;
        border-radius: 8px;
        background: white;
        color: var(--ink);
        outline: 0;
      }

      .search-input {
        padding: 0 14px 0 44px;
      }

      .input,
      .select {
        padding: 0 14px;
      }

      .textarea {
        min-height: 78px;
        resize: vertical;
        padding: 13px 14px;
      }

      .input:focus,
      .select:focus,
      .textarea:focus,
      .search-input:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.12);
      }

      .input[readonly] {
        background: #f4f4f5;
        color: #3f3f46;
      }

      .postcode-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 132px;
        gap: 8px;
      }

      .address-stack {
        display: grid;
        gap: 10px;
      }

      .recent-address-list {
        display: grid;
        gap: 8px;
        margin-top: 8px;
      }

      .recent-address-button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
        padding: 11px 12px;
        color: inherit;
        text-align: left;
      }

      .recent-address-button strong {
        display: block;
        font-size: 13px;
        line-height: 1.35;
      }

      .recent-address-button span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .payment-method-grid {
        display: grid;
        gap: 9px;
        margin-top: 10px;
      }

      .payment-method-option {
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr);
        gap: 10px;
        align-items: flex-start;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        padding: 13px;
      }

      .payment-method-option:has(input:checked) {
        border-color: var(--brand);
        background: #f4f4f5;
        box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.08);
      }

      .payment-method-option input {
        width: 18px;
        height: 18px;
        margin: 1px 0 0;
        accent-color: var(--brand);
      }

      .payment-method-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 14px;
        font-weight: 900;
      }

      .payment-method-copy {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .method-badge {
        flex: 0 0 auto;
        border-radius: 999px;
        background: #111827;
        padding: 3px 7px;
        color: white;
        font-size: 10px;
        font-weight: 900;
      }

      .payment-status-card {
        display: grid;
        gap: 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        padding: 16px;
      }

      .payment-status-card h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.25;
      }

      .payment-status-card p {
        margin: 0;
        color: #3f3f46;
        font-size: 14px;
        line-height: 1.65;
      }

      .owner-gate-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .owner-gate-list li {
        border-left: 3px solid var(--brand-light);
        padding-left: 10px;
        color: #3f3f46;
        font-size: 12px;
        font-weight: 800;
        line-height: 1.5;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .history-list {
        display: grid;
        gap: 10px;
      }

      .product-card,
      .summary-card,
      .notice-card,
      .state-card,
      .submission-card,
      .origin-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
      }

      .product-card {
        overflow: hidden;
      }

      .product-card .btn {
        min-height: 40px;
        padding: 10px 8px;
        font-size: 12px;
      }

      .product-card-main,
      .submission-card button {
        display: block;
        width: 100%;
        border: 0;
        background: transparent;
        color: inherit;
        text-align: left;
      }

      .product-media {
        aspect-ratio: 4 / 3;
        overflow: hidden;
        background: white;
      }

      .product-card.is-portrait .product-media {
        aspect-ratio: 4 / 5;
      }

      .product-media img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: white;
      }

      .product-body {
        padding: 12px;
      }

      .product-meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 8px;
      }

      .product-kicker,
      .status-chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 7px;
        font-size: 10px;
        font-weight: 900;
        line-height: 1;
      }

      .product-kicker {
        background: #f4f4f5;
        color: #27272a;
      }

      .status-chip {
        border: 1px solid #d4d4d8;
        background: white;
        color: #52525b;
      }

      .product-actions {
        display: grid;
        gap: 8px;
        padding: 0 14px 14px;
      }

      .product-actions .btn {
        width: 100%;
        min-height: 44px;
      }

      .product-title {
        margin: 0;
        font-size: 13px;
        font-weight: 900;
        line-height: 1.35;
      }

      .product-desc {
        display: -webkit-box;
        margin: 5px 0 0;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .price-row {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 7px;
        margin-top: 10px;
      }

      .price {
        margin: 0;
        font-size: 15px;
        font-weight: 900;
      }

      .original-price {
        margin: 0;
        color: #a1a1aa;
        font-size: 12px;
        text-decoration: line-through;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 8px;
        background: var(--accent);
        color: white;
        font-size: 11px;
        font-weight: 900;
      }

      .trust-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        background: white;
      }

      .trust-item {
        padding: 15px 8px;
        text-align: center;
      }

      .trust-item + .trust-item {
        border-left: 1px solid var(--line);
      }

      .trust-item svg {
        margin-bottom: 6px;
      }

      .trust-title {
        margin: 0;
        font-size: 12px;
        font-weight: 900;
      }

      .trust-desc {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.35;
      }

      .footer {
        margin-top: 8px;
        padding: 28px 16px 34px;
        background: var(--brand);
        color: rgba(255, 255, 255, 0.74);
        font-size: 11px;
        line-height: 1.55;
        text-align: left;
      }

      .footer-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        color: white;
        font-weight: 700;
      }

      .footer-links a {
        color: inherit;
        text-decoration: none;
      }

      .check-label a {
        color: var(--brand);
        font-weight: 950;
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .footer-business {
        display: grid;
        gap: 2px;
        margin: 16px auto 0;
        max-width: 360px;
      }

      .footer-business p {
        margin: 0;
      }

      .footer-copy {
        margin: 16px 0 0;
        text-align: center;
      }

      .image-stage {
        padding: 16px;
      }

      .main-image {
        position: relative;
        aspect-ratio: 4 / 3;
        overflow: hidden;
        border-radius: 8px;
        background: white;
        cursor: grab;
        touch-action: pan-y;
        user-select: none;
        --drag-offset: 0px;
      }

      .main-image.portrait {
        width: min(94%, 360px);
        margin: 0 auto;
        aspect-ratio: 4 / 5;
      }

      .main-image.is-dragging {
        cursor: grabbing;
      }

      .gallery-track {
        display: flex;
        width: 300%;
        height: 100%;
        transform: translateX(calc(-33.333333% + var(--drag-offset)));
        transition: transform 180ms ease;
        will-change: transform;
      }

      .main-image.is-dragging .gallery-track {
        transition: none;
      }

      .gallery-slide {
        flex: 0 0 33.333333%;
        height: 100%;
        background: white;
      }

      .main-image img,
      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: white;
        pointer-events: none;
        user-select: none;
      }

      .thumb-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .thumb {
        aspect-ratio: 1;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        padding: 0;
        cursor: pointer;
      }

      .thumb.active {
        border-color: var(--brand);
        border-width: 2px;
      }

      .detail-title {
        margin: 8px 0 0;
        font-size: 25px;
        line-height: 1.25;

          const year = String(date.getFullYear());

          return `${year}${month}${day}`;

        function trackingRandomToken(length = 6) {
          const bytes = new Uint8Array(length);
          if (window.crypto?.getRandomValues) {
            window.crypto.getRandomValues(bytes);
            return Array.from(bytes, (byte) => (byte % 36).toString(36)).join("").toUpperCase();
          }
          return Math.random().toString(36).slice(2, 2 + length).toUpperCase();

            payload: event.payload || {},
            event_id: event.id,

        function copyTrackingTestParams(url) {
          const params = new URLSearchParams(location.search);
          ["test", "codex_test", "pixel_test", "notify_test", "email_test", "test_run_id", "testRunId"].forEach((key) => {
            if (params.get(key) === "1") url.searchParams.set(key, "1");
            if ((key === "test_run_id" || key === "testRunId") && params.get(key)) {
              url.searchParams.set(key, params.get(key));
            }
          });
          return url;
        }

        function pixelEventToken(value) {
          const token = String(value || "")
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "_")
            .replace(/^_+|_+$/g, "");
          return token || "product";
        }

        function productNpayEventName(product) {
          const token = pixelEventToken(productRouteId(product.id) || product.id).slice(0, 32);
          return `NpayPurchaseClick_${token}`;
        }

        function productPurchaseEventName(product) {
          const token = pixelEventToken(productRouteId(product.id) || product.id).slice(0, 32);
          return `PurchaseCtaClick_${token}`;
        }

        function buildCommercePayload(product, extra = {}) {
          const quantity = Number(state.quantity || 1);
          const amount = getOrderTotal(product, quantity);
          const selectedAddOns = getSelectedAddOns(product);
          const addOnUnitTotal = getSelectedAddOnUnitTotal(product);
          const addOnTotal = addOnUnitTotal * quantity;
          const productScopedNpayEventName = productNpayEventName(product);
          const productScopedPurchaseEventName = productPurchaseEventName(product);
          return {
            productId: product.id,
            productSlug: productRouteId(product.id),
            productName: product.name,
            productScopedNpayEventName,
            productScopedPurchaseEventName,
            content_ids: [product.id],
            content_name: product.name,
            content_type: "product",
            currency: "KRW",
            value: amount,
            price: product.price,
            unitPrice: product.price + addOnUnitTotal,
            extraFee: Number(product.extraFee || 0),
            addOnUnitTotal,
            addOnTotal,
            selectedAddOns,
            quantity,
            amount,
            selectedOptions: { ...state.selectedOptions },
            page: state.page,
            route: hashForState(),
            attribution: readAttribution(),
            ...extra,
          };
        }

        function trackCommerceEvent(name, extra = {}, product = currentProduct()) {
          const clickId = extra.clickId || createTrackingId("CLK");
          const payload = buildCommercePayload(product, { clickId, ...extra });
          const event = trackPixelEvent(name, payload);
          if (name === "NpayPurchaseClick") {
            trackPixelEvent(payload.productScopedNpayEventName, {
              ...payload,
              baseEventName: name,
              productScoped: true,
              measurementUnit: "product_npay_click",
            });
          }
          if (name === "PurchaseCtaClick") {
            trackPixelEvent(payload.productScopedPurchaseEventName, {
              ...payload,
              baseEventName: name,
              productScoped: true,
              measurementUnit: "product_purchase_click",
            });
          }
          return event;
        }

        function persistState() {
          localStorage.setItem(
            storageKeys.state,
            JSON.stringify({ ...state, menuOpen: false, infoPanelType: "" }),
          );
        }

        function escapeHtml(value) {
          return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
        }

        function formatPrice(value) {
          return new Intl.NumberFormat("ko-KR").format(value || 0);
        }

        function getSelectedAddOns(product) {
          const priceMap = product.optionAddOnPrices || {};
          return Object.entries(priceMap)
            .map(([label, values]) => {
              const selectedValue = state.selectedOptions?.[label] || "";
              const price = Number(values?.[selectedValue] || 0);
              return { label, value: selectedValue, price };
            })
            .filter((item) => item.price > 0);
        }

        function getSelectedAddOnUnitTotal(product) {
          return getSelectedAddOns(product).reduce((sum, item) => sum + item.price, 0);
        }

        function getOrderTotal(product, quantity) {
          const count = Number(quantity || 1);
          return (product.price + getSelectedAddOnUnitTotal(product)) * count + Number(product.extraFee || 0);
        }

        function formatDate(value) {
          if (!value) return "-";
          return new Intl.DateTimeFormat("ko-KR", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
          }).format(new Date(value));
        }

        function formatPaymentMethod(value) {
          return paymentMethods[value]?.label || "결제수단 미정";
        }

        function formatSubmissionStatus(value) {
          if (value === "order_received") return "주문 접수 완료";
          if (value === "payment_pending") return "결제 안내 대기";
          return "주문 확인 중";
        }

        function buildTossCheckoutUrl(submission) {
          const params = new URLSearchParams({
            orderId: submission.id,
            amount: String(submission.amount || 0),
            orderName: submission.productName || "ITTEMMALL 주문",
            customerName: submission.customer?.name || "",
            customerEmail: submission.customer?.email || "",
            customerMobilePhone: String(submission.customer?.phone || "").replace(/\D/g, ""),
            source: "ittemmall-payment-page",
          });
          return `/payment/toss-checkout.html?${params.toString()}`;
        }

        function maskPhone(value) {
          const digits = String(value || "").replace(/\D/g, "");
          if (digits.length >= 10) {
            return `${digits.slice(0, 3)}-${digits.slice(3, 7)}-****`;
          }
          return "010-****-****";
        }

        function getInitialSelectedOptions(product) {
          return product.options.reduce((acc, option) => {
            acc[option.label] = option.values[0];
            return acc;
          }, {});
        }

        function findProduct(id) {
          return visibleProducts.find((product) => product.id === id);
        }

        function mainSiteProduct() {
          return homeProducts[0] || visibleProducts[0];
        }

        function isStandaloneProduct(product = currentProduct()) {
          return Boolean(product?.standaloneStore);
        }

        function representativeProduct() {
          return isStandaloneProduct() ? currentProduct() : mainSiteProduct();
        }

        function productRouteSlug(product) {
          if (product.slug) return product.slug;
          const color = product.options
            .find((option) => option.label === "색상")
            ?.values[0];
          if (color === "핑크") return "pink";
          if (color === "블랙") return "black";
          return product.id;
        }

        function productRouteId(productId) {
          const product = findProduct(productId);
          return product ? productRouteSlug(product) : productId;
        }

        function productFromRouteId(routeId) {
          return (
            visibleProducts.find((product) => productRouteSlug(product) === routeId) ||
            findProduct(routeId)
          );
        }

        function currentProduct() {
          return findProduct(state.selectedProductId) || mainSiteProduct();
        }

        function hasDraft() {
          return Object.entries(state.form).some(([key, value]) => {
            if (key === "paymentMethod") return false;
            if (key.startsWith("agree")) return Boolean(value);
            return String(value || "").trim().length > 0;
          });
        }

        function buildFulfillmentPrimary(form = state.form) {
          const postcode = String(form.postcode || "").trim();
          const baseAddress = String(form.roadAddress || form.jibunAddress || "").trim();
          const detail = String(form.detailAddress || "").trim();
          const extra = String(form.extraAddress || "").trim();
          const parts = [];
          if (postcode) parts.push(`[${postcode}]`);
          if (baseAddress) parts.push(baseAddress);
          if (detail) parts.push(detail);
          if (extra) parts.push(extra);
          return parts.join(" ").trim() || String(form.fulfillmentPrimary || "").trim();
        }

        function normalizeAddressRecord(form = state.form) {
          const roadAddress = String(form.roadAddress || "").trim();
          const jibunAddress = String(form.jibunAddress || "").trim();
          const detailAddress = String(form.detailAddress || "").trim();
          return {
            postcode: String(form.postcode || "").trim(),
            roadAddress,
            jibunAddress,
            detailAddress,
            extraAddress: String(form.extraAddress || "").trim(),
            fulfillmentPrimary: buildFulfillmentPrimary(form),
            label: detailAddress || roadAddress || jibunAddress || "최근 배송지",
            updatedAt: new Date().toISOString(),
          };
        }

        function readRecentAddresses() {
          const items = readJson(storageKeys.recentAddresses, []);
          return Array.isArray(items) ? items : [];
        }

        function saveRecentAddressFromForm() {
          const record = normalizeAddressRecord();
          if (!record.fulfillmentPrimary) return;
          const key = [
            record.postcode,
            record.roadAddress,
            record.jibunAddress,
            record.detailAddress,
          ]
            .join("|")
            .toLowerCase();
          const next = [
            record,
            ...readRecentAddresses().filter((item) => {
              const itemKey = [
                item.postcode,
                item.roadAddress,
                item.jibunAddress,
                item.detailAddress,
              ]
                .join("|")
                .toLowerCase();
              return itemKey !== key;
            }),
          ].slice(0, 3);
          localStorage.setItem(storageKeys.recentAddresses, JSON.stringify(next));
        }

        function applyRecentAddress(index) {
          const record = readRecentAddresses()[Number(index)];
          if (!record) return;
          Object.assign(state.form, {
            postcode: record.postcode || "",
            roadAddress: record.roadAddress || "",
            jibunAddress: record.jibunAddress || "",
            detailAddress: record.detailAddress || "",
            extraAddress: record.extraAddress || "",
            fulfillmentPrimary: record.fulfillmentPrimary || "",
          });
          persistState();
          render();
          window.setTimeout(() => document.querySelector('[data-field="detailAddress"]')?.focus(), 40);
        }

        function clearRecentAddresses() {
          localStorage.removeItem(storageKeys.recentAddresses);
          render();
        }

        function isFormReady() {
          const method = state.form.paymentMethod || "toss_pg";
          return Boolean(
            state.form.name.trim() &&
              state.form.phone.trim() &&
              state.form.email.trim() &&
              buildFulfillmentPrimary().trim() &&
              (state.form.roadAddress.trim() || state.form.fulfillmentPrimary.trim()) &&
              state.form.detailAddress.trim() &&
              paymentMethods[method] &&
              (state.form.agreeTermsPrivacy || state.form.agreeNotice),
          );
        }

        function pageKey() {
          if (state.page === "detail") return `detail:${state.selectedProductId}`;
          if (state.page === "submissionDetail") {
            return `submission:${state.viewSubmissionId}`;
          }
          return state.page;
        }

        function saveScroll() {
          state.scroll[pageKey()] = window.scrollY;
          persistState();
        }

        function restoreScroll() {
          const y = state.scroll[pageKey()] || 0;
          window.scrollTo(0, y);
        }

        function hashForState() {
          if (state.page === "detail") return `#/product/${productRouteId(state.selectedProductId)}`;
          if (state.page === "apply") return "#/apply";
          if (state.page === "payment") return "#/payment";
          if (state.page === "complete") {
            return state.lastSubmissionId
              ? `#/complete/${state.lastSubmissionId}`
              : "#/complete";
          }
          if (state.page === "history") return "#/history";
          if (state.page === "submissionDetail") {
            return `#/submission/${state.viewSubmissionId}`;
          }
          return "#/home";
        }

        function setHash(hash) {
          if (location.hash !== hash) {
            suppressHashChange = true;
            location.hash = hash;
          }
        }

        function setRootUrlForHome() {
          if (location.pathname === "/" && !location.hash) return;
          window.history.pushState(null, "", `/${location.search}`);
        }

        function setStandaloneProductUrl(product) {
          if (!product || location.protocol === "file:") {
            setHash(hashForState());
            return;
          }
          const targetPath = `/${productRouteSlug(product)}/`;
          const targetUrl = `${targetPath}${location.search}`;
          if (location.pathname !== targetPath || location.hash) {
            window.history.pushState(null, "", targetUrl);
          }
        }

        function applyHash(hash) {
          const parts = hash.replace(/^#\/?/, "").split("/");
          const route = parts[0] || "home";
          const id = parts[1] || "";
          const pathProduct = productFromPathname();

          function keepStandalonePageClosed() {
            if (pathProduct?.standaloneStore && state.page === "home") {
              state.page = "detail";
              state.selectedProductId = pathProduct.id;
              state.selectedImageIndex = 0;
              ensureOptionsForProduct();
            }
          }

          const routeProduct = productFromRouteId(id);
          if (route === "product" && routeProduct) {
            state.page = "detail";
            if (state.selectedProductId !== routeProduct.id) {
              state.selectedImageIndex = 0;
            }
            state.selectedProductId = routeProduct.id;
            ensureOptionsForProduct();
            return;
          }

          if (route === "apply") {
            state.page = "apply";
            ensureOptionsForProduct();
            return;
          }

          if (route === "payment") {
            state.page = "payment";
            ensureOptionsForProduct();
            return;
          }

          if (route === "complete") {
            state.page = "complete";
            state.lastSubmissionId = id || state.lastSubmissionId;
            return;
          }

          if (route === "history") {
            state.page = "history";
            return;
          }

          if (route === "info" && siteConfig.infoPanels[id]) {
            state.page = "home";
            state.infoPanelType = id;
            keepStandalonePageClosed();
            return;
          }

          if (route === "submission" && id) {
            state.page = "submissionDetail";
            state.viewSubmissionId = id;
            return;
          }

          state.page = "home";
          keepStandalonePageClosed();
        }

        function handleHashChange() {
          if (suppressHashChange) {
            suppressHashChange = false;
            return;
          }
          saveScroll();
          state.menuOpen = false;
          state.infoPanelType = "";
          applyHash(location.hash);
          if (state.page === "history") loadHistory();
          persistState();
          render();
          requestAnimationFrame(restoreScroll);
        }

        function navigate(page, patch = {}) {
          saveScroll();
          Object.assign(state, patch, { page, menuOpen: false, infoPanelType: "" });
          if (page === "history") loadHistory();
          persistState();
          if (page === "home") {
            setRootUrlForHome();
          } else if (page === "detail" && isStandaloneProduct()) {
            setStandaloneProductUrl(currentProduct());
          } else {
            setHash(hashForState());
          }
          render();
          requestAnimationFrame(restoreScroll);
        }

        function ensureOptionsForProduct() {
          const product = currentProduct();
          const optionMap = product.options.reduce((acc, option) => {
            acc[option.label] = option.values;
            return acc;
          }, {});
          const labels = Object.keys(optionMap).sort().join("|");
          const stateLabels = Object.keys(state.selectedOptions || {})
            .sort()
            .join("|");
          const hasInvalidValue = Object.entries(state.selectedOptions || {}).some(
            ([label, value]) => !optionMap[label]?.includes(value),
          );
          if (labels !== stateLabels || hasInvalidValue) {
            state.selectedOptions = getInitialSelectedOptions(product);
          }
        }

        function selectProduct(id, origin = null) {
          const product = findProduct(id);
          if (!product) return;
          navigate("detail", {
            selectedProductId: product.id,
            selectedImageIndex: 0,
            selectedOptions: getInitialSelectedOptions(product),
            quantity: 1,
            form: { ...emptyForm },
            editingSubmissionId: "",
            draftSubmissionId: "",
            origin:
              origin ||
              {
                page: state.page,
                label: originLabel(),
                hash: hashForState(),
              },
          });
        }

        function originLabel() {
          if (state.page === "history") return "주문 내역 확인";
          if (state.page === "submissionDetail") return "주문 상세 확인";
          if (state.page === "apply") return "주문서 작성";
          return "메인 상품 탐색";
        }

        function loadHistory() {
          historyView = { status: "loading", items: [], error: "" };
          window.setTimeout(() => {
            try {
              const items = readSubmissionsStrict().sort(
                (a, b) => new Date(b.updatedAt) - new Date(a.updatedAt),
              );
              historyView = {
                status: items.length ? "success" : "empty",
                items,
                error: "",
              };
            } catch (error) {
              historyView = {
                status: "error",
                items: [],
                error: error.message || "주문 내역을 불러오지 못했습니다.",
              };
            }
            if (state.page === "history") render();
          }, 220);
        }

        function handleClick(event) {
          const target = event.target.closest("[data-action]");
          if (!target) return;
          event.preventDefault();

          const action = target.dataset.action;
          const id = target.dataset.id || "";
          const optionLabel = target.dataset.optionLabel || "";
          const optionValue = target.dataset.optionValue || "";

          if (action === "toggle-menu") {
            state.menuOpen = !state.menuOpen;
            persistState();
            render();
          }
          if (action === "close-menu") {
            state.menuOpen = false;
            persistState();
            render();
          }
          if (action === "open-info") {
            state.infoPanelType = target.dataset.panel || "purchase";
            state.menuOpen = false;
            persistState();
            render();
          }
          if (action === "close-info") {
            state.infoPanelType = "";
            if (location.hash.startsWith("#/info/")) {
              if (state.page === "home") {
                setRootUrlForHome();
              } else {
                setHash(hashForState());
              }
            }
            persistState();
            render();
          }

          if (action === "home") {
            if (isStandaloneProduct()) {
              navigate("detail", {
                origin: {
                  page: "detail",
                  label: `${currentProduct().name} 전용 페이지`,
                  hash: `/${productRouteId(state.selectedProductId)}/`,
                },
              });
            } else {
              navigate("home", {
                origin: { page: "home", label: "메인 상품 탐색", hash: "/" },
              });
            }
          }

          if (action === "back") goBack();
          if (action === "history") navigate("history");
          if (action === "search") {
            if (isStandaloneProduct()) {
              navigate("detail");
              return;
            }
            navigate("home");
            window.setTimeout(() => {
              document.getElementById("productSearch")?.focus();
              document.getElementById("products")?.scrollIntoView({ block: "start" });
            }, 40);
          }
          if (action === "set-category") {
            state.selectedCategory = target.dataset.categoryId || "all";
            persistState();
            render();
            window.setTimeout(() => {
              document.getElementById("products")?.scrollIntoView({ block: "start" });
            }, 40);
          }
          if (action === "clear-product-filters") {
            state.searchQuery = "";
            state.selectedCategory = "all";
            persistState();
            render();
          }
          if (action === "menu-products") {
            if (isStandaloneProduct()) {
              navigate("detail");
              return;
            }
            navigate("home");
            window.setTimeout(() => {
              document.getElementById("products")?.scrollIntoView({ block: "start" });
            }, 40);
          }
          if (action === "support") {
            state.infoPanelType = "support";
            state.menuOpen = false;
            persistState();
            render();
          }
          if (action === "select-image") {
            clearGallerySwipeCommit();
            resetGallerySwipe();
            state.selectedImageIndex = Number(target.dataset.index || 0);
            persistState();
            render();
          }
          if (action === "select-option" && optionLabel) {
            state.selectedOptions[optionLabel] = optionValue;
            persistState();
            render();
          }
          if (action === "select-product") {
            const product = findProduct(id);
            if (product) {
              trackCommerceEvent(
                "ProductDetailClick",
                {
                  source: target.dataset.pixelSource || "product_card",
                  buttonLabel: target.textContent.trim(),
                },
                product,
              );
            }
            selectProduct(id);
          }
          if (action === "select-product-from-origin") {
            selectProduct(id, {
              page: "history",
              label: "주문 내역 확인",
              hash: "#/history",
            });
          }
          if (action === "apply") {
            const checkoutSource = target.dataset.checkoutSource || "direct_buy";
            const isNpayTrackingClick = checkoutSource === "npay";
            trackCommerceEvent(isNpayTrackingClick ? "NpayPurchaseClick" : "PurchaseCtaClick", {
              source: checkoutSource,
              buttonLabel: target.textContent.trim(),
              paymentMethod: "toss_pg",
              commerceEventType: isNpayTrackingClick ? "npay_button_click" : "purchase_button_click",
            });
            state.form.paymentMethod = "toss_pg";
            navigate("apply", {
              form: { ...state.form },
              draftSubmissionId: "",
              origin: {
                page: "detail",
                label: `${currentProduct().name} 상세`,
                hash: `#/product/${productRouteId(state.selectedProductId)}`,
              },
            });
          }
          if (action === "resume-origin") resumeOrigin();
          if (action === "quantity-minus") {
            state.quantity = Math.max(1, Number(state.quantity || 1) - 1);
            navigate(state.page);
          }
          if (action === "quantity-plus") {
            state.quantity = Number(state.quantity || 1) + 1;
            navigate(state.page);
          }
          if (action === "open-postcode") openPostcodeSearch();
          if (action === "use-recent-address") applyRecentAddress(target.dataset.index || 0);
          if (action === "clear-recent-addresses") clearRecentAddresses();
          if (action === "submit-apply") submitApply();
          if (action === "complete-payment") completeCurrentPayment();
          if (action === "view-submission") {
            navigate("submissionDetail", { viewSubmissionId: id });
          }
          if (action === "edit-submission") editSubmission(id);
          if (action === "retry-history") loadHistory();
          if (action === "resume-draft") navigate("apply");
          if (action === "clear-local-data") {
            if (confirm("저장된 주문 내역과 작성 중 상태를 모두 지울까요?")) {
              localStorage.removeItem(storageKeys.submissions);
              localStorage.removeItem(storageKeys.state);
              localStorage.removeItem(storageKeys.recentAddresses);
              Object.assign(state, {
                page: "home",
                selectedProductId: mainSiteProduct().id,
                selectedImageIndex: 0,
                selectedOptions: getInitialSelectedOptions(mainSiteProduct()),
                quantity: 1,
                form: { ...emptyForm },
                origin: { page: "home", label: "메인 상품 탐색", hash: "/" },
                editingSubmissionId: "",
                draftSubmissionId: "",
                completeMode: "create",
                lastSubmissionId: "",
                viewSubmissionId: "",
                menuOpen: false,
                infoPanelType: "",
                searchQuery: "",
                selectedCategory: "all",
                scroll: {},
              });
              navigate("home");
            }
          }
        }

        function handleGalleryPointerDown(event) {
          if (event.pointerType === "mouse" && event.button !== 0) return;
          const target = event.target.closest("[data-gallery-swipe]");
          if (!target || state.page !== "detail") return;
          const images = currentProduct().images?.length ? currentProduct().images : [currentProduct().image];
          if (images.length < 2) return;
          clearGallerySwipeCommit();
          target.classList.remove("is-dragging");
          target.style.setProperty("--drag-offset", "0px");
          gallerySwipe = {
            pointerId: event.pointerId,
            target,
            startX: event.clientX,
            startY: event.clientY,
            currentX: event.clientX,
            currentY: event.clientY,
            width: target.clientWidth || window.innerWidth,
            active: false,
          };
        }

        function handleGalleryPointerMove(event) {
          if (!gallerySwipe || gallerySwipe.pointerId !== event.pointerId) return;
          const swipe = gallerySwipe;
          if (!swipe.target.isConnected) {
            resetGallerySwipe();
            return;
          }

          swipe.currentX = event.clientX;
          swipe.currentY = event.clientY;
          const deltaX = swipe.currentX - swipe.startX;
          const deltaY = swipe.currentY - swipe.startY;
          const absX = Math.abs(deltaX);
          const absY = Math.abs(deltaY);

          if (!swipe.active) {
            if (absY > 18 && absY > absX * 1.15) {
              resetGallerySwipe();
              return;
            }
            if (absX < 8 || absX < absY * 1.1) return;
            swipe.active = true;
            swipe.target.classList.add("is-dragging");
          }

          const width = swipe.target.clientWidth || swipe.width || window.innerWidth;
          swipe.width = width;
          const clampedDelta = clamp(deltaX, -width, width);
          swipe.target.style.setProperty("--drag-offset", `${clampedDelta}px`);
        }

        function handleGalleryPointerUp(event) {
          if (!gallerySwipe || gallerySwipe.pointerId !== event.pointerId) return;
          const swipe = gallerySwipe;
          const deltaX = (swipe.currentX ?? event.clientX) - swipe.startX;
          const deltaY = (swipe.currentY ?? event.clientY) - swipe.startY;
          const absX = Math.abs(deltaX);
          const absY = Math.abs(deltaY);
          const width = swipe.target.clientWidth || swipe.width || window.innerWidth;
          const threshold = Math.min(90, width * 0.22);
          if (!swipe.active || absX < threshold || absX < absY * 1.1) {
            resetGallerySwipe();
            return;
          }
          commitGallerySwipe(deltaX < 0 ? 1 : -1, swipe.target, width);
        }

        function resetGallerySwipe() {
          const swipe = gallerySwipe;
          gallerySwipe = null;
          if (!swipe?.target?.isConnected) return;
          swipe.target.classList.remove("is-dragging");
          swipe.target.style.setProperty("--drag-offset", "0px");
        }

        function clearGallerySwipeCommit() {
          if (!gallerySwipeCommitTimer) return;
          window.clearTimeout(gallerySwipeCommitTimer);
          gallerySwipeCommitTimer = 0;
        }

        function commitGallerySwipe(direction, target, width) {
          gallerySwipe = null;
          target.classList.remove("is-dragging");
          target.style.setProperty("--drag-offset", `${direction > 0 ? -width : width}px`);
          clearGallerySwipeCommit();
          gallerySwipeCommitTimer = window.setTimeout(() => {
            gallerySwipeCommitTimer = 0;
            shiftGalleryImage(direction);
          }, 190);
        }

        function clamp(value, min, max) {
          return Math.min(Math.max(value, min), max);
        }

        function shiftGalleryImage(direction) {
          const images = currentProduct().images?.length ? currentProduct().images : [currentProduct().image];
          if (images.length < 2) return;
          const currentIndex = Math.min(
            Math.max(Number(state.selectedImageIndex || 0), 0),
            images.length - 1,
          );
          state.selectedImageIndex = (currentIndex + direction + images.length) % images.length;
          persistState();
          render();
        }

              state.form.fulfillmentPrimary = buildFulfillmentPrimary();

            persistState();
            updateProductVisibility();

          const optionLabel = event.target.dataset.optionLabel;

              event.target.type === "checkbox" ? event.target.checked : event.target.value;
            if (["postcode", "roadAddress", "jibunAddress", "detailAddress", "extraAddress"].includes(field)) {
              state.form.fulfillmentPrimary = buildFulfillmentPrimary();

            persistState();
            syncSubmitButton();

        function openPostcodeSearch() {
          const Postcode = window.daum?.Postcode || window.kakao?.Postcode;
          if (!Postcode) {

            return;
          }

          new Postcode({
            oncomplete(data) {
              const roadAddress = data.roadAddress || data.autoRoadAddress || "";
              const jibunAddress = data.jibunAddress || data.autoJibunAddress || "";
              const extraParts = [];
              if (data.bname && /(동|로|가)$/.test(data.bname)) extraParts.push(data.bname);
              if (data.buildingName && data.apartment === "Y") extraParts.push(data.buildingName);
              const extraAddress = extraParts.length ? `(${extraParts.join(", ")})` : "";
              Object.assign(state.form, {
                postcode: data.zonecode || "",
                roadAddress,
                jibunAddress,
                extraAddress,
              });
              state.form.fulfillmentPrimary = buildFulfillmentPrimary();
              persistState();
              render();
              window.setTimeout(() => document.querySelector('[data-field="detailAddress"]')?.focus(), 60);
            },
          }).open({
            popupTitle: "ITTEMMALL 배송지 검색",
          });

        function updateProductVisibility() {
          const query = state.searchQuery.trim().toLowerCase();
          const selectedCategory = state.selectedCategory || "all";
          document.querySelectorAll("[data-product-card]").forEach((card) => {
            const haystack = card.dataset.productCard.toLowerCase();
            const category = card.dataset.category || "";
            const queryMatch = !query || haystack.includes(query);
            const categoryMatch = selectedCategory === "all" || category === selectedCategory;
            card.classList.toggle("hidden", !queryMatch || !categoryMatch);
          });
          const empty = document.getElementById("productFilterEmpty");
          if (empty) {
            const visibleCount = document.querySelectorAll(
              "[data-product-card]:not(.hidden)",

            empty.classList.toggle("hidden", visibleCount > 0);

        function submitApply() {
          if (!isFormReady()) return;

          const product = currentProduct();
          const paymentMethod = state.form.paymentMethod || "toss_pg";
          const payload = buildCommercePayload(product, {
            source: "payment_page_button",
            buttonLabel: "결제수단 확인하기",
            paymentMethod,
            customerFields: {
              hasName: Boolean(state.form.name.trim()),
              hasPhone: Boolean(state.form.phone.trim()),
              hasEmail: Boolean(state.form.email.trim()),
              hasFulfillmentPrimary: Boolean(buildFulfillmentPrimary().trim()),
              hasRequest: Boolean(state.form.request.trim()),
              agreeTermsPrivacy: Boolean(state.form.agreeTermsPrivacy || state.form.agreeNotice),
              agreeContact: Boolean(state.form.agreeContact),
            },
            originLabel: state.origin?.label || "상품 탐색",
            commerceEventType: "payment_page_button_click",
          });
          trackPixelEvent("PaymentPageButtonClick", payload);
          trackPixelEvent("InitiateCheckout", payload);
          const submission = upsertSubmission("payment_pending");
          state.lastSubmissionId = submission.id;
          state.viewSubmissionId = submission.id;
          state.draftSubmissionId = submission.id;
          state.completeMode = state.editingSubmissionId ? "edit" : "create";
          state.editingSubmissionId = "";
          saveRecentAddressFromForm();
          navigate("payment");
        }

        function upsertSubmission(status = "payment_pending") {
          const product = currentProduct();
          const address = normalizeAddressRecord();
          const now = new Date().toISOString();
          const storedItems = readJson(storageKeys.submissions, []);
          const existingItems = Array.isArray(storedItems) ? storedItems : [];
          const currentId = state.editingSubmissionId || state.draftSubmissionId || "";
          const existing = existingItems.find((item) => item.id === currentId);
          const id =
            existing?.id ||
            `IT-${Date.now().toString(36).toUpperCase()}-${Math.random()
              .toString(36)
              .slice(2, 6)
              .toUpperCase()}`;
          const submission = {
            ...(existing || {}),
            id,
            status,
            paymentStatus: status,
            paymentMethod: state.form.paymentMethod || "toss_pg",
            productId: product.id,
            productName: product.name,
            productImage: product.image,
            selectedOptions: { ...state.selectedOptions },
            selectedAddOns: getSelectedAddOns(product),
            quantity: Number(state.quantity || 1),
            amount: getOrderTotal(product, state.quantity),
            addOnUnitTotal: getSelectedAddOnUnitTotal(product),
            addOnTotal: getSelectedAddOnUnitTotal(product) * Number(state.quantity || 1),
            extraFee: Number(product.extraFee || 0),
            extraFeeLabel: product.extraFeeLabel || "",
            customer: {
              ...state.form,
              ...address,
              fulfillmentPrimary: address.fulfillmentPrimary,
            },
            source: "ittemmall-mobile-mvp-file",
            createdAt: existing?.createdAt || now,
            updatedAt: now,
          };
          const next = [submission, ...existingItems.filter((item) => item.id !== id)];
          saveSubmissions(next);
          return submission;
        }

        function completeCurrentPayment() {
          const id = state.lastSubmissionId;
          if (!id) {
            navigate("history");
            return;
          }
          const mode = state.completeMode;
          const storedItems = readJson(storageKeys.submissions, []);
          const items = Array.isArray(storedItems) ? storedItems : [];
          const now = new Date().toISOString();
          const next = items.map((item) =>
            item.id === id
              ? { ...item, status: "order_received", paymentStatus: "order_received", updatedAt: now }
              : item,
          );
          saveSubmissions(next);
          state.form = { ...emptyForm };
          state.editingSubmissionId = "";
          state.draftSubmissionId = "";
          navigate("complete", { lastSubmissionId: id, completeMode: mode });
        }

        function editSubmission(id) {
          const item = readJson(storageKeys.submissions, []).find(
            (submission) => submission.id === id,
          );
          if (!item) {
            navigate("history");
            return;
          }

          navigate("apply", {
            selectedProductId: item.productId,
            selectedOptions: { ...item.selectedOptions },
            quantity: item.quantity,
            form: { ...emptyForm, ...item.customer },
            editingSubmissionId: id,
            draftSubmissionId: id,
            origin: {
              page: "submissionDetail",
              label: "주문 상세 수정",
              hash: `#/submission/${id}`,
            },
          });
        }

          if (product?.theme?.mode === "white") return "is-white-theme";

        function productThemeStyle(product) {
          if (!product || !product.theme) {
            return "";
          }

          const themeMap = {
            "--brand": product.theme.brand,
            "--brand-light": product.theme.brandLight,
            "--accent": product.theme.accent,
            "--accent-2": product.theme.accent2,
            "--soft": product.theme.soft,
            "--on-brand": product.theme.onBrand,
            "--header-bg": product.theme.headerBg,
            "--header-text": product.theme.headerText,
            "--header-border": product.theme.headerBorder,
          };

          return Object.entries(themeMap)
            .filter(([, value]) => value)
            .map(([key, value]) => `${key}: ${escapeHtml(String(value))}`)
            .join("; ");
        }

        function trackPageViewIfNeeded() {
          const product = currentProduct();
          const viewKey = `${state.page}:${product.id}:${location.hash || hashForState()}`;

          lastTrackedViewKey = viewKey;

        function renderOptionSelect(option) {
          const value = state.selectedOptions[option.label] || option.values[0];
          if (option.label === "색상") return renderColorOption(option, value);
          if (option.label === "타입") return renderTypeOption(option, value);
          return `
            <div class="option-field">
              <span class="field-label">${escapeHtml(option.label)}</span>
              <div class="option-grid">
                ${option.values
                  .map((item) => renderOptionButton(option.label, item, item === value))
                  .join("")}
              </div>
            </div>
          `;
        }

        function renderColorOption(option, selectedValue) {
          return `
            <div class="option-field">
              <span class="field-label">${escapeHtml(option.label)}</span>
              <div class="color-swatch-row">
                ${option.values
                  .map(
                    (item) => `
                      <button
                        class="color-swatch-button ${item === selectedValue ? "is-selected" : ""}"
                        type="button"
                        data-action="select-option"
                        data-option-label="${escapeHtml(option.label)}"
                        data-option-value="${escapeHtml(item)}"
                        style="--swatch-color:${escapeHtml(getColorSwatch(item))}"
                        aria-label="${escapeHtml(item)} 색상 선택"
                        aria-pressed="${item === selectedValue ? "true" : "false"}"
                      ></button>
                    `,
                  )
                  .join("")}
                <span class="color-swatch-name">${escapeHtml(selectedValue)}</span>
              </div>
            </div>
          `;
        }

        function renderTypeOption(option, selectedValue) {
          return `
            <div class="option-field">
              <span class="field-label">${escapeHtml(option.label)}</span>
              <div class="type-value">${escapeHtml(selectedValue)}</div>
            </div>
          `;
        }

        function renderOptionButton(label, value, selected) {
          const tone = getOptionTone(value);
          return `
            <button
              class="option-button ${tone ? `tone-${tone}` : ""} ${selected ? "is-selected" : ""}"
              type="button"
              data-action="select-option"
              data-option-label="${escapeHtml(label)}"
              data-option-value="${escapeHtml(value)}"
              aria-pressed="${selected ? "true" : "false"}"
            >
              <span>${escapeHtml(formatOptionLabel(value))}</span>
              ${selected ? `<span class="option-check">${icon("check", 20)}</span>` : ""}
            </button>
          `;
        }

        function getOptionTone(value) {
          const normalized = String(value).trim().toLowerCase();
          if (["black", "블랙", "charcoal", "차콜"].includes(normalized)) return "black";
          if (["white", "화이트"].includes(normalized)) return "white";
          if (["gray", "grey", "그레이"].includes(normalized)) return "gray";
          if (["pink", "핑크"].includes(normalized)) return "pink";
          return "";
        }

        function getColorSwatch(value) {
          const normalized = String(value).trim().toLowerCase();
          if (["pink", "핑크"].includes(normalized)) return "#e5bcc0";
          if (["black", "블랙"].includes(normalized)) return "#111111";
          if (["charcoal", "차콜"].includes(normalized)) return "#2f3437";
          if (["white", "화이트"].includes(normalized)) return "#ffffff";
          if (["silver", "실버"].includes(normalized)) return "linear-gradient(135deg, #f8fafc 0%, #cbd5e1 48%, #f1f5f9 100%)";
          if (["gray", "grey", "그레이"].includes(normalized)) return "#d4d4d8";
          return "#e5bcc0";
        }

        function formatOptionLabel(value) {
          const normalized = String(value).trim().toLowerCase();
          if (normalized === "블랙") return "BLACK";
          if (normalized === "화이트") return "WHITE";
          if (normalized === "그레이") return "GRAY";
          if (normalized === "차콜") return "CHARCOAL";
          if (normalized === "핑크") return "핑크";
          return value;
        }

                        `<p class="summary-meta">${escapeHtml(label)}: ${escapeHtml(value)}</p>`,
                    )
                    .join("")}
                  <p class="summary-meta">수량: ${state.quantity}개</p>
                  ${
                    addOnTotal
                      ? `<p class="summary-meta">추가상품 금액: ₩ ${formatPrice(addOnTotal)}</p>`
                      : ""
                  }
                  ${
                    product.extraFee
                      ? `<p class="summary-meta">${escapeHtml(product.extraFeeLabel || "추가 비용")}: ₩ ${formatPrice(product.extraFee)}</p>`
                      : ""
                  }
                  <p class="summary-price">₩ ${formatPrice(getOrderTotal(product, state.quantity))}</p>
                </div>
              </div>
            </section>
          `;
        }

        function renderCompletePage() {
          const submission = readJson(storageKeys.submissions, []).find(
            (item) => item.id === state.lastSubmissionId,
          );
          if (!submission) {
            return `
              <main>
                <section class="section">
                  <div class="state-card">
                    <h2>주문 완료 내역을 찾지 못했습니다.</h2>
                    <p>저장된 주문 내역에서 다시 확인하거나 상품 목록으로 돌아갈 수 있습니다.</p>
                    <div class="button-row">
                      <button class="btn primary" type="button" data-action="history">주문 내역</button>
                      <button class="btn" type="button" data-action="home">상품 보기</button>
                    </div>
                  </div>
                </section>
                ${renderFooter()}
              </main>
            `;
          }

          return `
            <main>
              <section class="complete-wrap">
                <div class="complete-icon">${icon("check", 40)}</div>
                <div class="complete-text">
                  <h1>${state.completeMode === "edit" ? "주문 수정이 완료되었습니다." : "주문 접수가 완료되었습니다."}</h1>
                  <p>구매 가능 일정과 결제 안내를<br />입력하신 연락처로 안내드리겠습니다.</p>
                </div>
                <div style="margin-top:28px">
                  ${renderSubmissionSummary(submission)}
                </div>
                <div class="button-row" style="margin-top:18px">
                  <button class="btn primary" type="button" data-action="history">주문 내역 보기</button>
                  <button class="btn" type="button" data-action="select-product-from-origin" data-id="${submission.productId}">상품 다시 보기</button>
                </div>
                <div class="button-row one" style="margin-top:10px">
                  <button class="btn ghost" type="button" data-action="home">다른 상품 보기</button>
                </div>
              </section>
              ${renderFooter()}
            </main>
          `;
        }

        function renderSubmissionSummary(submission) {
          return `
            <section class="summary-card">
              <div class="summary-flex">
                <div class="summary-image">
                  <img src="${submission.productImage}" alt="${escapeHtml(submission.productName)}" />
                </div>
                <dl class="detail-dl" style="flex:1">
                  <dt>상품명</dt>
                  <dd>${escapeHtml(submission.productName)}</dd>
                  ${Object.entries(submission.selectedOptions || {})
                    .map(
                      ([label, value]) => `
                        <dt>${escapeHtml(label)}</dt>
                        <dd>${escapeHtml(value)}</dd>
                      `,
                    )
                    .join("")}
                  <dt>수량</dt>
                  <dd>${submission.quantity}개</dd>
                  ${
                    submission.extraFee
                      ? `
                        <dt>${escapeHtml(submission.extraFeeLabel || "추가 비용")}</dt>
                        <dd>₩ ${formatPrice(submission.extraFee)}</dd>
                      `
                      : ""
                  }
                  ${
                    submission.addOnTotal
                      ? `
                        <dt>추가상품 금액</dt>
                        <dd>₩ ${formatPrice(submission.addOnTotal)}</dd>
                      `
                      : ""
                  }
                  <dt>주문 금액</dt>
                  <dd>₩ ${formatPrice(submission.amount)}</dd>
                  <dt>결제수단</dt>
                  <dd>${escapeHtml(formatPaymentMethod(submission.paymentMethod))}</dd>
                  <dt>상태</dt>
                  <dd>${escapeHtml(formatSubmissionStatus(submission.status || submission.paymentStatus))}</dd>
                  <dt>연락처</dt>
                  <dd>${escapeHtml(maskPhone(submission.customer?.phone))}</dd>
                </dl>
              </div>
            </section>
          `;
        }

        function renderHistoryPage() {
          return `
            <main>
              <section class="section">
                <div class="section-heading">
                  <div>
                    <p class="eyebrow">HISTORY</p>
                    <h2>주문 내역</h2>
                  </div>
                  <button class="link-button" type="button" data-action="clear-local-data">저장값 초기화</button>
                </div>
                ${renderHistoryState()}
              </section>
              ${renderFooter()}
            </main>
          `;
        }

        function renderHistoryState() {
          if (historyView.status === "loading" || historyView.status === "idle") {
            return `
              <div class="state-card">
                <h2>주문 내역을 불러오는 중입니다.</h2>
                <p>이 브라우저에 저장된 주문 데이터를 확인하고 있어요.</p>
                <div class="skeleton" aria-hidden="true">
                  <div class="skeleton-line"></div>
                  <div class="skeleton-line" style="width:78%;margin:0 auto"></div>
                  <div class="skeleton-line" style="width:54%;margin:0 auto"></div>
                </div>
              </div>
            `;
          }

          if (historyView.status === "error") {
            return `
              <div class="state-card">
                <h2>내역을 불러오지 못했습니다.</h2>
                <p>${escapeHtml(historyView.error)} 저장 데이터를 초기화하거나 다시 불러올 수 있습니다.</p>
                <div class="button-row">
                  <button class="btn primary" type="button" data-action="retry-history">다시 불러오기</button>
                  <button class="btn" type="button" data-action="home">상품 보기</button>
                </div>
              </div>
            `;
          }

          if (historyView.status === "empty") {
            return `
              <div class="state-card">
                <h2>아직 주문 내역이 없습니다.</h2>
                <p>상품 상세에서 주문서를 접수하면 이곳에 내역이 쌓이고 새로고침 후에도 남습니다.</p>
                <div class="button-row">
                  <button class="btn primary" type="button" data-action="select-product" data-id="${representativeProduct().id}">대표 상품 보기</button>
                  <button class="btn" type="button" data-action="home">상품 목록</button>
                </div>
                ${
                  hasDraft()
                    ? `<div class="button-row one" style="margin-top:10px"><button class="btn warning" type="button" data-action="resume-draft">작성 중 주문서 이어가기</button></div>`
                    : ""
                }
              </div>
            `;
          }

          return `
            <div class="origin-card">
              <p>주문 내역은 이 브라우저의 LocalStorage에 저장됩니다. 상세에서 수정하거나 상품으로 돌아갈 수 있어요.</p>
              <div class="button-row">
                <button class="btn primary" type="button" data-action="home">상품 더 보기</button>
                ${
                  hasDraft()
                    ? `<button class="btn warning" type="button" data-action="resume-draft">주문서 작성 이어가기</button>`
                    : `<button class="btn" type="button" data-action="select-product" data-id="${representativeProduct().id}">대표 상품 보기</button>`
                }
              </div>
            </div>
            <div class="history-list">
              ${historyView.items.map(renderSubmissionCard).join("")}
            </div>
          `;
        }

        function renderSubmissionCard(submission) {
          return `
            <article class="submission-card">
              <button type="button" data-action="view-submission" data-id="${submission.id}">
                <div class="submission-top">
                  <div class="submission-thumb">
                    <img src="${submission.productImage}" alt="${escapeHtml(submission.productName)}" />
                  </div>
                  <div style="min-width:0;flex:1">
                    <p class="submission-name">${escapeHtml(submission.productName)}</p>
                    <p class="submission-meta">
                      ${escapeHtml(submission.id)}<br />
                      ${formatDate(submission.updatedAt)} · ₩ ${formatPrice(submission.amount)}
                      <br />${escapeHtml(formatPaymentMethod(submission.paymentMethod))}
                    </p>
                    <span class="status-pill">${escapeHtml(formatSubmissionStatus(submission.status || submission.paymentStatus))}</span>
                  </div>
                </div>
              </button>
            </article>
          `;
        }

        function renderSubmissionDetailPage() {
          const submission = readJson(storageKeys.submissions, []).find(
            (item) => item.id === state.viewSubmissionId,
          );

          if (!submission) {
            return `
              <main>
                <section class="section">
                  <div class="state-card">
                    <h2>주문 상세를 찾지 못했습니다.</h2>
                    <p>내역이 삭제되었거나 다른 브라우저에 저장된 주문일 수 있습니다.</p>
                    <div class="button-row">
                      <button class="btn primary" type="button" data-action="history">주문 내역</button>
                      <button class="btn" type="button" data-action="home">상품 보기</button>
                    </div>
                  </div>
                </section>
                ${renderFooter()}
              </main>
            `;
          }

          return `
            <main>
              <section class="section">
                ${renderOriginCard("상세 확인 후 수정하거나 상품으로 돌아갈 수 있습니다.", "history", "내역으로", "home", "상품 목록")}
                ${renderSubmissionSummary(submission)}
                <section class="summary-card" style="margin-top:12px">
                  <dl class="detail-dl">
                    <dt>주문번호</dt>
                    <dd>${escapeHtml(submission.id)}</dd>
                    <dt>상태</dt>
                    <dd>${escapeHtml(formatSubmissionStatus(submission.status || submission.paymentStatus))}</dd>
                    <dt>결제수단</dt>
                    <dd>${escapeHtml(formatPaymentMethod(submission.paymentMethod))}</dd>
                    <dt>주문자</dt>
                    <dd>${escapeHtml(submission.customer?.name || "-")}</dd>
                    <dt>이메일</dt>
                    <dd>${escapeHtml(submission.customer?.email || "-")}</dd>
                    <dt>${escapeHtml(siteConfig.fulfillmentPrimaryLabel)}</dt>
                    <dd>${escapeHtml(submission.customer?.fulfillmentPrimary || submission.customer?.address || "-")}</dd>
                    <dt>요청사항</dt>
                    <dd>${escapeHtml(submission.customer?.request || "-")}</dd>
                    <dt>저장 시각</dt>
                    <dd>${formatDate(submission.updatedAt)}</dd>
                  </dl>
                </section>
                <div class="button-row" style="margin-top:14px">
                  <button class="btn primary" type="button" data-action="edit-submission" data-id="${submission.id}">주문 정보 수정</button>
                  <button class="btn" type="button" data-action="select-product-from-origin" data-id="${submission.productId}">상품 다시 보기</button>
                </div>
              </section>
              ${renderFooter()}
            </main>
          `;
        }

        function renderTrustRow() {
          const items = [
            { icon: "package", title: "상품 확인", desc: "상세 정보 제공" },
            { icon: "shield", title: "주문 정보", desc: "안전하게 입력" },
            { icon: "headphones", title: "고객 안내", desc: "연락처로 안내" },
          ];
          return `
            <section class="trust-row">
              ${items
                .map(
                  (item) => `
                    <div class="trust-item">
                      ${icon(item.icon, 18)}
                      <p class="trust-title">${escapeHtml(item.title)}</p>
                      <p class="trust-desc">${escapeHtml(item.desc)}</p>
                    </div>
                  `,
                )
                .join("")}
            </section>
          `;
        }

        function renderFooter() {
          const footerLinks = [
            { label: "고객센터", href: "#/info/support" },
            { label: "사업자 정보", href: "./legal/business.html" },
            { label: "이용약관", href: "./legal/terms.html" },
            { label: "개인정보처리방침", href: "./legal/privacy.html" },
            { label: "주문 조회", href: "./payment/order-lookup.html" },
          ];
          const legal = siteConfig.legalInfo;
          return `
            <footer class="footer">
              <div class="footer-links">
                ${footerLinks.map((link) => `<a href="${escapeHtml(link.href)}">${escapeHtml(link.label)}</a>`).join("")}
              </div>
              <div class="footer-business" aria-label="사업자 정보">
                <p>상호: ${escapeHtml(legal.companyName)} · 대표자: ${escapeHtml(legal.representative)}</p>
                <p>사업자등록번호: ${escapeHtml(legal.businessRegistrationNumber)}</p>
                <p>통신판매업 신고번호: ${escapeHtml(legal.ecommerceLicense)}</p>
                <p>주소: ${escapeHtml(legal.businessAddress)}</p>
                <p>고객센터: ${escapeHtml(legal.customerCenter)} · ${escapeHtml(legal.email)}</p>
              </div>
              <p class="footer-copy">© 2026 ${escapeHtml(siteConfig.brandName)}. All rights reserved.</p>
            </footer>
          `;
        }

        function icon(name, size = 22) {
          const attrs = `width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"`;
          const paths = {
            "arrow-left": '<path d="m15 18-6-6 6-6"/><path d="M21 12H9"/>',
            menu: '<path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/>',
            search: '<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>',
            check: '<path d="M20 6 9 17l-5-5"/>',
            list: '<path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/>',
            info: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
            refresh: '<path d="M3 12a9 9 0 0 1 15.5-6.2L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.2L3 16"/><path d="M3 21v-5h5"/>',
            headphones: '<path d="M3 14h3a2 2 0 0 1 2 2v3H6a3 3 0 0 1-3-3v-2Z"/><path d="M21 14h-3a2 2 0 0 0-2 2v3h2a3 3 0 0 0 3-3v-2Z"/><path d="M3 14v-2a9 9 0 0 1 18 0v2"/>',
            package: '<path d="m7.5 4.3 9 5.2"/><path d="M21 8.5 12 14 3 8.5"/><path d="M12 22V14"/><path d="M3 8.5v7L12 21l9-5.5v-7L12 3 3 8.5Z"/>',
            truck:
              '<path d="M10 17h4V5H2v12h3"/><path d="M14 17h1"/><path d="M14 8h4l4 4v5h-3"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>',
            shield:
              '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/>',
            lock:
              '<rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
            "chevron-down": '<path d="m6 9 6 6 6-6"/>',
            "chevron-right": '<path d="m9 18 6-6-6-6"/>',
            x: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
          };
          return `<svg ${attrs}>${paths[name] || ""}</svg>`;
        }
      })();
    </script>
  </body>
</html>
