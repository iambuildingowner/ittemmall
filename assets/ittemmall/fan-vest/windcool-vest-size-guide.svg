<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">윈드쿨 선풍기 조끼 사이즈 측정 기준</title>
  <desc id="desc">가슴둘레, 어깨너비, 총장 측정 위치를 보여주는 조끼 사이즈 안내 이미지</desc>
  <rect width="1200" height="760" fill="#f6f7f8"/>
  <rect x="70" y="58" width="1060" height="644" rx="26" fill="#ffffff" stroke="#d9dde3" stroke-width="2"/>
  <text x="600" y="124" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="40" font-weight="800" fill="#111827">사이즈 측정 기준</text>
  <text x="600" y="166" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="20" font-weight="500" fill="#5b6472">반팔 위 착용은 정사이즈, 작업복 위 착용은 한 사이즈 크게 권장합니다.</text>

  <g transform="translate(175 225)">
    <path d="M164 12 L239 42 L274 156 L240 184 L224 120 L224 420 L44 420 L44 120 L28 184 L-6 156 L29 42 Z" fill="#172031" stroke="#0b1020" stroke-width="4" stroke-linejoin="round"/>
    <path d="M104 22 C112 64 156 64 164 22" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
    <line x1="134" y1="62" x2="134" y2="420" stroke="#2f3a4b" stroke-width="5"/>
    <rect x="72" y="165" width="44" height="100" rx="10" fill="#263247" stroke="#43516a" stroke-width="3"/>
    <rect x="152" y="165" width="44" height="100" rx="10" fill="#263247" stroke="#43516a" stroke-width="3"/>
    <circle cx="79" cy="330" r="34" fill="#0e1420" stroke="#506076" stroke-width="4"/>
    <circle cx="189" cy="330" r="34" fill="#0e1420" stroke="#506076" stroke-width="4"/>
    <circle cx="79" cy="330" r="19" fill="none" stroke="#6f7f96" stroke-width="3"/>
    <circle cx="189" cy="330" r="19" fill="none" stroke="#6f7f96" stroke-width="3"/>
    <text x="134" y="476" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="22" font-weight="800" fill="#111827">앞면 기준</text>
  </g>

  <g transform="translate(612 225)">
    <path d="M164 12 L239 42 L274 156 L240 184 L224 120 L224 420 L44 420 L44 120 L28 184 L-6 156 L29 42 Z" fill="#202a3b" stroke="#0b1020" stroke-width="4" stroke-linejoin="round"/>
    <path d="M104 22 C112 64 156 64 164 22" fill="none" stroke="#3b4657" stroke-width="4" stroke-linecap="round"/>
    <line x1="44" y1="139" x2="224" y2="139" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <line x1="44" y1="107" x2="224" y2="107" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
    <line x1="250" y1="44" x2="250" y2="420" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <circle cx="79" cy="330" r="34" fill="#0e1420" stroke="#506076" stroke-width="4"/>
    <circle cx="189" cy="330" r="34" fill="#0e1420" stroke="#506076" stroke-width="4"/>
    <circle cx="79" cy="330" r="19" fill="none" stroke="#6f7f96" stroke-width="3"/>
    <circle cx="189" cy="330" r="19" fill="none" stroke="#6f7f96" stroke-width="3"/>

    <g font-family="Pretendard, Arial, sans-serif" font-size="22" font-weight="800">
      <rect x="-2" y="88" width="110" height="34" rx="17" fill="#dcfce7"/>
      <text x="53" y="112" text-anchor="middle" fill="#166534">어깨너비</text>
      <rect x="-2" y="122" width="110" height="34" rx="17" fill="#fef3c7"/>
      <text x="53" y="146" text-anchor="middle" fill="#92400e">가슴둘레</text>
      <rect x="266" y="210" width="78" height="34" rx="17" fill="#dbeafe"/>
      <text x="305" y="234" text-anchor="middle" fill="#1d4ed8">총장</text>
      <text x="134" y="476" text-anchor="middle" font-size="22" fill="#111827">뒷면 기준</text>
    </g>
  </g>

  <g font-family="Pretendard, Arial, sans-serif" font-size="20" font-weight="600" fill="#4b5563">
    <text x="600" y="650" text-anchor="middle">실측은 평평하게 펼친 상태에서 측정합니다. 생산 차수와 측정 방식에 따라 1~3cm 오차가 있을 수 있습니다.</text>
  </g>
</svg>
