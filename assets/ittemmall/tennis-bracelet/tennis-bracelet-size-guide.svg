<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">테니스 팔찌 사이즈 측정 안내</title>
  <desc id="desc">손목 둘레를 잰 뒤 1에서 1.5센티미터 여유를 더해 팔찌 사이즈를 선택하는 안내 이미지</desc>
  <rect width="900" height="520" rx="34" fill="#f7ffff"/>
  <rect x="48" y="48" width="804" height="424" rx="28" fill="#d8f4ef" stroke="#111111" stroke-width="3"/>
  <path d="M292 222c54-72 144-80 212-32 61 43 82 112 51 168-34 62-119 86-191 54-70-31-118-104-72-190Z" fill="#fff8f0" stroke="#111111" stroke-width="4"/>
  <path d="M285 220c28-34 63-51 102-52 50-2 98 22 132 65" fill="none" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
  <path d="M303 292c72 48 159 44 230-12" fill="none" stroke="#16a394" stroke-width="16" stroke-linecap="round" stroke-dasharray="18 18"/>
  <path d="M296 298c76 60 180 56 250-14" fill="none" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
  <circle cx="302" cy="292" r="11" fill="#111111"/>
  <circle cx="541" cy="283" r="11" fill="#111111"/>
  <path d="M295 150h250" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <path d="M295 150l22-18m-22 18 22 18M545 150l-22-18m22 18-22 18" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <text x="450" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111111">손목 둘레 측정</text>
  <text x="450" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111111">측정값 + 1~1.5cm 여유 권장</text>
  <g fill="#111111" font-family="Arial, sans-serif">
    <text x="100" y="110" font-size="25" font-weight="700">01</text>
    <text x="100" y="145" font-size="22">손목 가장 얇은 부분을</text>
    <text x="100" y="175" font-size="22">줄자로 감아 측정</text>
    <text x="620" y="110" font-size="25" font-weight="700">02</text>
    <text x="620" y="145" font-size="22">너무 딱 맞으면</text>
    <text x="620" y="175" font-size="22">한 사이즈 크게 선택</text>
    <text x="620" y="340" font-size="25" font-weight="700">03</text>
    <text x="620" y="375" font-size="22">선물용이면 16~17cm</text>
    <text x="620" y="405" font-size="22">기본 추천</text>
  </g>
</svg>
