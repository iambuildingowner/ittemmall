<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>토스 결제 실패 | ITTEMMALL</title>
    <link rel="canonical" href="https://ittemmall.com/payment/toss-fail.html" />
    <link rel="icon" type="image/svg+xml" href="../assets/ittemmall/favicon.svg" />
    <style>
      body {
        margin: 0;
        background: #f7f7f2;
        color: #111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(100%, 540px);
        border: 1px solid #e4e4e7;
        border-radius: 8px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 18px 54px rgba(17, 24, 39, 0.08);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #b91c1c;
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.18em;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.15;
      }

      p,
      dd {
        color: #3f3f46;
        line-height: 1.75;
      }

      dl {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 10px 12px;
        margin: 20px 0 0;
        border-top: 1px solid #e4e4e7;
        padding-top: 16px;
      }

      dt {
        color: #71717a;
        font-weight: 850;
      }

      dd {
        margin: 0;
        font-weight: 850;
        word-break: break-word;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }

      .btn {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border: 1px solid #1d4985;
        border-radius: 8px;
        background: #fff;
        color: #1d4985;
        padding: 0 16px;
        font-weight: 950;
        text-decoration: none;
      }

      .btn.primary {
        background: #1d4985;
        color: #fff;
      }

      @media (max-width: 560px) {
        dl {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <p class="eyebrow">TOSS PAYMENT FAILED</p>
        <h1>결제 인증을 완료하지 못했습니다.</h1>
        <p>결제창에서 취소했거나 인증 중 오류가 발생했습니다. 아래 내용을 확인한 뒤 다시 시도할 수 있습니다.</p>
        <dl>
          <dt>오류 코드</dt>
          <dd id="code">-</dd>
          <dt>오류 메시지</dt>
          <dd id="message">-</dd>
          <dt>주문번호</dt>
          <dd id="orderId">-</dd>
        </dl>
        <div class="actions">
          <a class="btn primary" id="retryLink" href="../#/history">다시 시도</a>
          <a class="btn" href="../">상품 보기</a>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var orderId = params.get("orderId") || params.get("localOrderId") || "";
        document.getElementById("code").textContent = params.get("code") || "-";
        document.getElementById("message").textContent = params.get("message") || "결제가 취소되었거나 완료되지 않았습니다.";
        document.getElementById("orderId").textContent = orderId || "-";
        if (orderId) {
          document.getElementById("retryLink").href = "../#/submission/" + encodeURIComponent(orderId);
        }
      })();
    </script>
  </body>
</html>
