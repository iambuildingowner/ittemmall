<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="color-scheme" content="light only" />
    <meta name="darkreader-lock" />
    <title>ITTEMMALL | Orders Admin</title>
    <link rel="icon" type="image/svg+xml" href="../assets/ittemmall/favicon.svg" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f7f8fb;
        color: #101828;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        min-height: 40px;
        border: 1px solid #1d4985;
        border-radius: 8px;
        background: #1d4985;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 800;
        padding: 0 14px;
      }

      button.secondary {
        background: #fff;
        color: #1d4985;
      }

      button.danger {
        border-color: #b42318;
        background: #b42318;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      input,
      select,
      textarea {
        min-height: 40px;
        width: 100%;
        border: 1px solid #d0d5dd;
        border-radius: 8px;
        background: #fff;
        color: #101828;
        padding: 0 12px;
      }

      textarea {
        min-height: 82px;
        padding: 10px 12px;
        resize: vertical;
      }

      .shell {
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 2;
        border-bottom: 1px solid #e4e7ec;
        background: #fff;
      }

      .topbar-inner,
      .main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar-inner {
        display: flex;
        min-height: 68px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        color: #1d4985;
        font-size: 20px;
        font-weight: 950;
        letter-spacing: 0.12em;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .main {
        padding: 28px 0 44px;
      }

      .login-panel,
      .panel {
        border: 1px solid #e4e7ec;
        border-radius: 8px;
        background: #fff;
      }

      .login-panel {
        width: min(100%, 520px);
        margin: 72px auto 0;
        padding: 24px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #667085;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.16em;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 10px;
        font-size: 28px;
        line-height: 1.25;
      }

      h2 {
        margin-bottom: 12px;
        font-size: 18px;
      }

      .muted {
        color: #667085;
        font-size: 14px;
        line-height: 1.6;
      }

      .form-grid {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(340px, 0.85fr);
        gap: 16px;
      }

      .panel {
        min-width: 0;
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #e4e7ec;
        padding: 16px;
      }

      .filters {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 120px;
        gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid #e4e7ec;
      }

      .state {
        padding: 28px 16px;
      }

      .orders {
        display: grid;
        max-height: 680px;
        overflow: auto;
      }

      .order-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        width: 100%;
        min-height: 84px;
        align-items: center;
        border: 0;
        border-bottom: 1px solid #edf0f4;
        border-radius: 0;
        background: #fff;
        color: #101828;
        padding: 14px 16px;
        text-align: left;
      }

      .order-row:hover,
      .order-row.active {
        background: #f2f6ff;
      }

      .order-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 15px;
        font-weight: 900;
      }

      .order-meta {
        margin-top: 5px;
        color: #667085;
        font-size: 13px;
      }

      .pill {
        display: inline-flex;
        min-width: 104px;
        min-height: 28px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #ecfdf3;
        color: #067647;
        font-size: 12px;
        font-weight: 900;
        padding: 0 10px;
        white-space: nowrap;
      }

      .pill.pending {
        background: #fff7e6;
        color: #b54708;
      }

      .pill.error {
        background: #fef3f2;
        color: #b42318;
      }

      .pill.neutral {
        background: #f2f4f7;
        color: #344054;
      }

      .detail {
        padding: 16px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr);
        gap: 8px 12px;
        margin-top: 16px;
        font-size: 14px;
      }

      .summary-grid dt {
        color: #667085;
        font-weight: 800;
      }

      .summary-grid dd {
        min-width: 0;
        margin: 0;
        overflow-wrap: anywhere;
      }

      .detail-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .action-box {
        display: grid;
        gap: 10px;
        margin-top: 16px;
        border: 1px solid #e4e7ec;
        border-radius: 8px;
        background: #f9fafb;
        padding: 12px;
      }

      .error-box {
        border: 1px solid #fecdca;
        border-radius: 8px;
        background: #fffbfa;
        color: #b42318;
        padding: 12px;
        font-size: 14px;
        font-weight: 800;
      }

      .success-box {
        border: 1px solid #abefc6;
        border-radius: 8px;
        background: #f6fef9;
        color: #067647;
        padding: 12px;
        font-size: 14px;
        font-weight: 800;
      }

      @media (max-width: 860px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }

        .topbar-inner {
          align-items: flex-start;
          flex-direction: column;
          padding: 14px 0;
        }

        .top-actions {
          width: 100%;
        }

        .top-actions button {
          flex: 1;
        }

        .filters {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div>
            <div class="brand">ITTEMMALL</div>
            <p class="muted" style="margin:4px 0 0">Orders Admin</p>
          </div>
          <div class="top-actions" id="topActions"></div>
        </div>
      </header>
      <main class="main" id="app"></main>
    </div>
    <script>
      (function () {
        var storageKeys = {
          selectedOrderId: "ittemmall:admin:selectedOrderId",
          search: "ittemmall:admin:search",
          limit: "ittemmall:admin:limit",
          token: "ittemmall:admin:token",
        };

        var state = {
          token: sessionStorage.getItem(storageKeys.token) || "",
          status: "idle",
          error: "",
          orders: [],
          selectedOrderId: localStorage.getItem(storageKeys.selectedOrderId) || "",
          search: localStorage.getItem(storageKeys.search) || "",
          limit: Number(localStorage.getItem(storageKeys.limit) || 100),
          cancelReason: "고객 요청 취소",
          actionStatus: "idle",
          actionMessage: "",
        };

        var app = document.getElementById("app");
        var topActions = document.getElementById("topActions");

        function escapeHtml(value) {
          return String(value || "").replace(/[&<>"']/g, function (char) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char];
          });
        }

        function formatPrice(value) {
          return Number(value || 0).toLocaleString("ko-KR");
        }

        function formatDate(value) {
          if (!value) return "-";
          var date = new Date(value);
          if (Number.isNaN(date.getTime())) return value;
          return date.toLocaleString("ko-KR", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
          });
        }

        function statusLabel(order) {
          if (order.paymentStatus === "canceled" || order.status === "payment_canceled") return "결제 취소";
          if (order.paymentStatus === "cancel_pending" || order.status === "payment_cancel_pending") return "취소 대기";
          if (order.paymentStatus === "approved" || order.status === "payment_approved") return "결제 승인";
          if (order.paymentMethod === "naver_pay") return "네이버페이 대기";
          if (order.paymentMethod === "toss_pg") return "토스 PG 대기";
          if (order.status === "order_received") return "주문 접수";
          return order.status || "상태 확인";
        }

        function fulfillmentLabel(value) {
          var labels = {
            new: "신규",
            contacted: "연락 완료",
            manual_payment_confirmed: "수동 입금 확인",
            preparing: "발송 준비",
            shipped: "발송 완료",
            completed: "처리 완료",
            closed: "종결",
          };
          return labels[value || "new"] || "신규";
        }

        function statusClass(order) {
          if (order.paymentStatus === "canceled" || order.status === "payment_canceled") return "neutral";
          if (order.paymentStatus === "cancel_pending" || order.status === "payment_cancel_pending") return "pending";
          if (order.paymentStatus === "approved" || order.status === "payment_approved") return "";
          if (order.status === "error") return "error";
          return "pending";
        }

        function canCancelNaverPay(order) {
          return Boolean(
            order &&
              order.paymentMethod === "naver_pay" &&
              order.paymentStatus === "approved" &&
              (order.paymentId || (order.naverPay && order.naverPay.paymentId)),
          );
        }

        function filteredOrders() {
          var keyword = state.search.trim().toLowerCase();
          if (!keyword) return state.orders;
          return state.orders.filter(function (order) {
            return [
              order.id,
              order.productName,
              order.customer && order.customer.name,
              order.customer && order.customer.phone,
              order.customer && order.customer.email,
              order.status,
              order.paymentStatus,
              order.shipment && order.shipment.carrier,
              order.shipment && order.shipment.trackingNumber,
            ]
              .join(" ")
              .toLowerCase()
              .includes(keyword);
          });
        }

        function selectedOrder() {
          return state.orders.find(function (order) {
            return order.id === state.selectedOrderId;
          }) || filteredOrders()[0] || null;
        }

        function renderTopActions() {
          topActions.innerHTML = state.token
            ? '<button class="secondary" type="button" data-action="ops">운영점검</button><button class="secondary" type="button" data-action="refresh">새로고침</button><button class="secondary" type="button" data-action="export-csv">CSV 다운로드</button><button class="danger" type="button" data-action="logout">로그아웃</button>'
            : '<button class="secondary" type="button" data-action="home">사이트 보기</button><button class="secondary" type="button" data-action="ops">운영점검</button>';
        }

        function render() {
          renderTopActions();
          if (!state.token) {
            app.innerHTML = renderLogin();
            return;
          }
          app.innerHTML = renderDashboard();
        }

        function renderLogin() {
          return [
            '<section class="login-panel">',
            '<p class="eyebrow">SECURE ACCESS</p>',
            "<h1>주문 관리</h1>",
            '<p class="muted">ITTEMMALL_ADMIN_TOKEN이 필요합니다.</p>',
            state.error ? '<div class="error-box">' + escapeHtml(state.error) + "</div>" : "",
            '<div class="form-grid">',
            '<input id="tokenInput" type="password" autocomplete="current-password" placeholder="관리자 토큰" />',
            '<button type="button" data-action="login">접속</button>',
            '<button class="secondary" type="button" data-action="home">사이트 보기</button>',
            '<button class="secondary" type="button" data-action="ops">운영점검</button>',
            "</div>",
            "</section>",
          ].join("");
        }

        function renderDashboard() {
          var orders = filteredOrders();
          var detail = selectedOrder();
          return [
            '<section class="dashboard-grid">',
            '<div class="panel">',
            '<div class="panel-head"><div><p class="eyebrow">ORDERS</p><h2>주문 내역</h2></div><span class="pill">' + orders.length + "건</span></div>",
            '<div class="filters">',
            '<input data-field="search" value="' + escapeHtml(state.search) + '" placeholder="주문번호, 이름, 연락처, 상품 검색" />',
            '<select data-field="limit">',
            [25, 50, 100, 200].map(function (limit) {
              return '<option value="' + limit + '"' + (state.limit === limit ? " selected" : "") + ">" + limit + "개</option>";
            }).join(""),
            "</select>",
            "</div>",
            renderOrders(orders),
            "</div>",
            '<aside class="panel">',
            '<div class="panel-head"><div><p class="eyebrow">DETAIL</p><h2>주문 상세</h2></div></div>',
            renderDetail(detail),
            "</aside>",
            "</section>",
          ].join("");
        }

        function renderOrders(orders) {
          if (state.status === "loading") {
            return '<div class="state"><h2>불러오는 중</h2><p class="muted">서버 주문 저장소를 확인하고 있습니다.</p></div>';
          }
          if (state.error) {
            return '<div class="state"><div class="error-box">' + escapeHtml(state.error) + '</div><div class="detail-actions"><button type="button" data-action="refresh">다시 시도</button><button class="secondary" type="button" data-action="logout">토큰 다시 입력</button></div></div>';
          }
          if (!orders.length) {
            return '<div class="state"><h2>주문 없음</h2><p class="muted">조건에 맞는 주문이 없습니다.</p><div class="detail-actions"><button type="button" data-action="refresh">새로고침</button><button class="secondary" type="button" data-action="home">사이트 보기</button></div></div>';
          }
          return '<div class="orders">' + orders.map(renderOrderRow).join("") + "</div>";
        }

        function renderOrderRow(order) {
          var active = selectedOrder() && selectedOrder().id === order.id ? " active" : "";
          return [
            '<button class="order-row' + active + '" type="button" data-action="select-order" data-id="' + escapeHtml(order.id) + '">',
            "<div>",
            '<div class="order-title">' + escapeHtml(order.productName || order.id) + "</div>",
            '<div class="order-meta">' + escapeHtml(order.id) + " · " + escapeHtml(order.customer && order.customer.name) + " · " + fulfillmentLabel(order.fulfillmentStatus) + " · " + formatDate(order.updatedAt) + " · ₩ " + formatPrice(order.amount) + "</div>",
            "</div>",
            '<span class="pill ' + statusClass(order) + '">' + escapeHtml(statusLabel(order)) + "</span>",
            "</button>",
          ].join("");
        }

        function renderDetail(order) {
          if (!order) {
            return '<div class="detail"><p class="muted">선택된 주문이 없습니다.</p><div class="detail-actions"><button type="button" data-action="refresh">새로고침</button><button class="secondary" type="button" data-action="home">사이트 보기</button></div></div>';
          }
          return [
            '<div class="detail">',
            '<span class="pill ' + statusClass(order) + '">' + escapeHtml(statusLabel(order)) + "</span>",
            '<dl class="summary-grid">',
            row("주문번호", order.id),
            row("상품", order.productName),
            row("수량", (order.quantity || 1) + "개"),
            row("금액", "₩ " + formatPrice(order.amount)),
            row("주문자", order.customer && order.customer.name),
            row("연락처", order.customer && order.customer.phone),
            row("이메일", order.customer && order.customer.email),
            row("주소", order.customer && order.customer.fulfillmentPrimary),
            row("요청사항", order.customer && order.customer.request),
            row("약관/개인정보 동의", order.customer && order.customer.agreeTermsPrivacy ? "Y" : "N"),
            row("연락 안내 동의", order.customer && order.customer.agreeContact ? "Y" : "N"),
            row("결제수단", order.paymentMethod),
            row("결제상태", order.paymentStatus),
            row("운영상태", fulfillmentLabel(order.fulfillmentStatus)),
            row("택배사", order.shipment && order.shipment.carrier),
            row("송장번호", order.shipment && order.shipment.trackingNumber),
            row("배송조회", order.shipment && order.shipment.trackingUrl),
            row("배송조회 자동생성", order.shipment && order.shipment.trackingUrlAuto ? "Y" : ""),
            row("발송메모", order.shipment && order.shipment.memo),
            row("발송일", formatDate(order.shipment && order.shipment.shippedAt)),
            row("관리자메모", order.adminNote),
            row("결제ID", order.paymentId || (order.naverPay && order.naverPay.paymentId)),
            row("취소금액", order.canceledAmount ? "₩ " + formatPrice(order.canceledAmount) : ""),
            row("취소사유", order.cancelReason),
            row("생성", formatDate(order.createdAt)),
            row("수정", formatDate(order.updatedAt)),
            "</dl>",
            renderActionMessage(),
            renderFulfillmentBox(order),
            renderCancelBox(order),
            '<div class="detail-actions">',
            '<button type="button" data-action="copy-id" data-id="' + escapeHtml(order.id) + '">주문번호 복사</button>',
            '<button class="secondary" type="button" data-action="refresh">새로고침</button>',
            '<button class="secondary" type="button" data-action="ops">운영점검</button>',
            '<button class="secondary" type="button" data-action="health">JSON 헬스체크</button>',
            "</div>",
            "</div>",
          ].join("");
        }

        function renderActionMessage() {
          if (!state.actionMessage) return "";
          var className = state.actionStatus === "error" ? "error-box" : "success-box";
          return '<div class="' + className + '">' + escapeHtml(state.actionMessage) + "</div>";
        }

        function renderCancelBox(order) {
          if (!canCancelNaverPay(order)) return "";
          return [
            '<section class="action-box">',
            '<p class="eyebrow" style="margin:0">NAVER PAY CANCEL</p>',
            '<textarea data-field="cancelReason" placeholder="취소 사유">' + escapeHtml(state.cancelReason) + "</textarea>",
            '<button class="danger" type="button" data-action="cancel-naver-pay" data-id="' + escapeHtml(order.id) + '">네이버페이 취소 요청</button>',
            "</section>",
          ].join("");
        }

        function renderFulfillmentBox(order) {
          var selected = order.fulfillmentStatus || "new";
          var shipment = order.shipment || {};
          var options = [
            ["new", "신규"],
            ["contacted", "연락 완료"],
            ["manual_payment_confirmed", "수동 입금 확인"],
            ["preparing", "발송 준비"],
            ["shipped", "발송 완료"],
            ["completed", "처리 완료"],
            ["closed", "종결"],
          ];
          return [
            '<section class="action-box">',
            '<p class="eyebrow" style="margin:0">ORDER OPS</p>',
            '<select data-role="fulfillmentStatus">',
            options.map(function (option) {
              return '<option value="' + option[0] + '"' + (selected === option[0] ? " selected" : "") + ">" + option[1] + "</option>";
            }).join(""),
            "</select>",
            '<input data-role="shipmentCarrier" value="' + escapeHtml(shipment.carrier || "") + '" placeholder="택배사" />',
            '<input data-role="shipmentTrackingNumber" value="' + escapeHtml(shipment.trackingNumber || "") + '" placeholder="송장번호" />',
            '<input data-role="shipmentTrackingUrl" value="' + escapeHtml(shipment.trackingUrl || "") + '" placeholder="배송조회 URL (비우면 자동)" />',
            '<textarea data-role="shipmentMemo" placeholder="발송 메모">' + escapeHtml(shipment.memo || "") + "</textarea>",
            '<textarea data-role="adminNote" placeholder="관리자 메모">' + escapeHtml(order.adminNote || "") + "</textarea>",
            '<button type="button" data-action="save-fulfillment" data-id="' + escapeHtml(order.id) + '">운영 상태 저장</button>',
            "</section>",
          ].join("");
        }

        function row(label, value) {
          return "<dt>" + escapeHtml(label) + "</dt><dd>" + escapeHtml(value || "-") + "</dd>";
        }

        function loadOrders() {
          if (!state.token) return;
          state.status = "loading";
          state.error = "";
          render();
          fetch("./admin-orders.php?limit=" + encodeURIComponent(state.limit), {
            headers: { "X-Ittemmall-Admin-Token": state.token },
            credentials: "same-origin",
          })
            .then(function (response) {
              return response.json().then(function (data) {
                return { ok: response.ok, status: response.status, data: data };
              });
            })
            .then(function (result) {
              if (!result.ok || !result.data.ok) {
                throw new Error(result.data.message || result.data.error || "주문 내역을 불러오지 못했습니다.");
              }
              state.orders = Array.isArray(result.data.orders) ? result.data.orders : [];
              state.status = "ready";
              state.error = "";
          if (!selectedOrder() && state.orders[0]) {
            state.selectedOrderId = state.orders[0].id;
          }
          state.actionStatus = "idle";
          persistState();
          render();
            })
            .catch(function (error) {
              state.status = "error";
              state.error = error.message || "주문 내역을 불러오지 못했습니다.";
              render();
            });
        }

        function persistState() {
          localStorage.setItem(storageKeys.selectedOrderId, state.selectedOrderId || "");
          localStorage.setItem(storageKeys.search, state.search || "");
          localStorage.setItem(storageKeys.limit, String(state.limit || 100));
          if (state.token) sessionStorage.setItem(storageKeys.token, state.token);
        }

        app.addEventListener("input", function (event) {
          var field = event.target.dataset.field;
          if (field === "search") {
            state.search = event.target.value;
            persistState();
            render();
          }
          if (field === "cancelReason") {
            state.cancelReason = event.target.value;
          }
        });

        app.addEventListener("change", function (event) {
          if (event.target.dataset.field === "limit") {
            state.limit = Number(event.target.value || 100);
            persistState();
            loadOrders();
          }
        });

        document.body.addEventListener("click", function (event) {
          var button = event.target.closest("[data-action]");
          if (!button) return;
          var action = button.dataset.action;
          if (action === "login") {
            var input = document.getElementById("tokenInput");
            state.token = input ? input.value.trim() : "";
            state.error = state.token ? "" : "관리자 토큰을 입력해주세요.";
            persistState();
            render();
            if (state.token) loadOrders();
          }
          if (action === "logout") {
            sessionStorage.removeItem(storageKeys.token);
            state.token = "";
            state.orders = [];
            state.error = "";
            render();
          }
          if (action === "refresh") loadOrders();
          if (action === "select-order") {
            state.selectedOrderId = button.dataset.id || "";
            persistState();
            render();
          }
          if (action === "copy-id") {
            navigator.clipboard && navigator.clipboard.writeText(button.dataset.id || "");
          }
          if (action === "save-fulfillment") {
            saveFulfillment(button.dataset.id || "");
          }
          if (action === "export-csv") {
            downloadOrdersCsv();
          }
          if (action === "cancel-naver-pay") {
            requestNaverPayCancel(button.dataset.id || "");
          }
          if (action === "home") window.location.href = "../#/home";
          if (action === "health") window.location.href = "./healthcheck.php";
          if (action === "ops") window.location.href = "./ops.html?origin=admin";
        });

        function requestNaverPayCancel(orderId) {
          var order = state.orders.find(function (item) {
            return item.id === orderId;
          });
          if (!canCancelNaverPay(order)) {
            state.actionStatus = "error";
            state.actionMessage = "취소 가능한 네이버페이 승인 주문이 아닙니다.";
            render();
            return;
          }
          if (!window.confirm("네이버페이 취소를 요청할까요?")) return;
          state.actionStatus = "loading";
          state.actionMessage = "네이버페이 취소 요청 중입니다.";
          render();
          fetch("./naverpay-cancel.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Ittemmall-Admin-Token": state.token,
            },
            credentials: "same-origin",
            body: JSON.stringify({
              orderId: orderId,
              cancelReason: state.cancelReason || "고객 요청 취소",
            }),
          })
            .then(function (response) {
              return response.json().then(function (data) {
                return { ok: response.ok, status: response.status, data: data };
              });
            })
            .then(function (result) {
              if (!result.ok || !result.data.ok) {
                throw new Error(result.data.message || result.data.error || "네이버페이 취소 요청에 실패했습니다.");
              }
              state.actionStatus = "success";
              state.actionMessage = "네이버페이 취소 상태가 저장되었습니다.";
              loadOrders();
            })
            .catch(function (error) {
              state.actionStatus = "error";
              state.actionMessage = error.message || "네이버페이 취소 요청에 실패했습니다.";
              render();
            });
        }

        function saveFulfillment(orderId) {
          var statusField = app.querySelector('[data-role="fulfillmentStatus"]');
          var noteField = app.querySelector('[data-role="adminNote"]');
          var carrierField = app.querySelector('[data-role="shipmentCarrier"]');
          var trackingNumberField = app.querySelector('[data-role="shipmentTrackingNumber"]');
          var trackingUrlField = app.querySelector('[data-role="shipmentTrackingUrl"]');
          var shipmentMemoField = app.querySelector('[data-role="shipmentMemo"]');
          var fulfillmentStatus = statusField ? statusField.value : "new";
          var adminNote = noteField ? noteField.value : "";
          var shipment = {
            carrier: carrierField ? carrierField.value : "",
            trackingNumber: trackingNumberField ? trackingNumberField.value : "",
            trackingUrl: trackingUrlField ? trackingUrlField.value : "",
            memo: shipmentMemoField ? shipmentMemoField.value : "",
          };
          state.actionStatus = "loading";
          state.actionMessage = "운영 상태를 저장 중입니다.";
          render();
          fetch("./admin-orders.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Ittemmall-Admin-Token": state.token,
            },
            credentials: "same-origin",
            body: JSON.stringify({
              action: "update_fulfillment",
              orderId: orderId,
              fulfillmentStatus: fulfillmentStatus,
              shipment: shipment,
              adminNote: adminNote,
            }),
          })
            .then(function (response) {
              return response.json().then(function (data) {
                return { ok: response.ok, status: response.status, data: data };
              });
            })
            .then(function (result) {
              if (!result.ok || !result.data.ok) {
                throw new Error(result.data.message || result.data.error || "운영 상태 저장에 실패했습니다.");
              }
              state.orders = state.orders.map(function (order) {
                return order.id === orderId ? result.data.order : order;
              });
              state.actionStatus = "success";
              state.actionMessage = "운영 상태가 저장되었습니다.";
              render();
            })
            .catch(function (error) {
              state.actionStatus = "error";
              state.actionMessage = error.message || "운영 상태 저장에 실패했습니다.";
              render();
            });
        }

        function csvCell(value) {
          var text = String(value == null ? "" : value).replace(/\r?\n/g, " ");
          return '"' + text.replace(/"/g, '""') + '"';
        }

        function downloadOrdersCsv() {
          var rows = filteredOrders();
          if (!rows.length) {
            state.actionStatus = "error";
            state.actionMessage = "다운로드할 주문이 없습니다.";
            render();
            return;
          }
          var header = [
            "주문번호",
            "상품",
            "수량",
            "금액",
            "주문자",
            "연락처",
            "이메일",
            "주소",
            "약관/개인정보 동의",
            "연락 안내 동의",
            "결제수단",
            "결제상태",
            "운영상태",
            "택배사",
            "송장번호",
            "배송조회URL",
            "배송조회자동생성",
            "발송메모",
            "발송일",
            "관리자메모",
            "수정일",
          ];
          var lines = [header.map(csvCell).join(",")].concat(rows.map(function (order) {
            return [
              order.id,
              order.productName,
              order.quantity || 1,
              order.amount || 0,
              order.customer && order.customer.name,
              order.customer && order.customer.phone,
              order.customer && order.customer.email,
              order.customer && order.customer.fulfillmentPrimary,
              order.customer && order.customer.agreeTermsPrivacy ? "Y" : "N",
              order.customer && order.customer.agreeContact ? "Y" : "N",
              order.paymentMethod,
              order.paymentStatus,
              fulfillmentLabel(order.fulfillmentStatus),
              order.shipment && order.shipment.carrier,
              order.shipment && order.shipment.trackingNumber,
              order.shipment && order.shipment.trackingUrl,
              order.shipment && order.shipment.trackingUrlAuto ? "Y" : "N",
              order.shipment && order.shipment.memo,
              order.shipment && order.shipment.shippedAt,
              order.adminNote,
              order.updatedAt,
            ].map(csvCell).join(",");
          }));
          var blob = new Blob(["\ufeff" + lines.join("\n")], { type: "text/csv;charset=utf-8" });
          var url = URL.createObjectURL(blob);
          var link = document.createElement("a");
          link.href = url;
          link.download = "ittemmall-orders-" + new Date().toISOString().slice(0, 10) + ".csv";
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        }

        render();
        if (state.token) loadOrders();
      })();
    </script>
  </body>
</html>
