<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light only" />
    <meta name="darkreader-lock" />
    <meta name="robots" content="noindex,nofollow" />
    <title>ITTEMMALL Payment</title>
    <link rel="canonical" href="https://ittemmall.com/payment/" />
    <link rel="icon" type="image/svg+xml" href="../assets/ittemmall/favicon.svg" />
    <!-- Meta Pixel Code -->
    <script>
      (function () {
        var pixelId = "1288524852852406";
        var params = new URLSearchParams(window.location.search);
        var isTest =
          params.get("test") === "1" ||
          params.get("codex_test") === "1" ||
          params.get("pixel_test") === "1";
        var payload = {
          content_ids: ["product-001"],
          content_name: "MARCE Sweet Pickleball Paddle Pink",
          content_type: "product",
          value: 79000,
          currency: "KRW",
          product_slug: "pink",
          site_name: "ittemmall",
          checkout_scope: "ittemmall_ittemmall_pink",
          source: "ittemmall_payment_hub",
          fakeDoorEvent: "PaymentPageView",
        };

        if (isTest) payload.__test = true;

        window.dataLayer = window.dataLayer || [];
        pushDataLayerEvent("IttemmallPaymentPageView");
        pushDataLayerEvent("PaymentPageView");

        if (!isTest) {
          (function (f, b, e, v, n, t, s) {
            if (f.fbq) return;
            n = f.fbq = function () {
              n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
            };
            if (!f._fbq) f._fbq = n;
            n.push = n;
            n.loaded = true;
            n.version = "2.0";
            n.queue = [];
            t = b.createElement(e);
            t.async = true;
            t.src = v;
            s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s);
          })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");

          window.fbq("init", pixelId);
          window.fbq("track", "PageView");
          window.fbq("trackCustom", "IttemmallPaymentPageView", payload);
          window.fbq("trackCustom", "PaymentPageView", payload);
        }

        sendServerEvent("IttemmallPaymentPageView");
        sendServerEvent("PaymentPageView");

        function pushDataLayerEvent(eventName) {
          window.dataLayer.push(Object.assign({ event: eventName }, payload));
        }

        function sendServerEvent(eventName) {
          try {
            var event = {
              event: eventName,
              payload: payload,
              path: "/payment/",
              url: window.location.href,
              referrer: document.referrer || "",
              attribution: {},
              timestamp: new Date().toISOString(),
              meta_pixel_id: pixelId,
              brand: "ITTEMMALL",
              product_focus: "ittemmall-pickleball-paddle-pink",
            };
            var body = JSON.stringify(event);
            if (navigator.sendBeacon) {
              var blob = new Blob([body], { type: "application/json" });
              if (navigator.sendBeacon("/track.php", blob)) return;
            }
            fetch("/track.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: body,
              credentials: "same-origin",
              keepalive: true,
            }).catch(function () {});
          } catch (error) {}
        }
      })();
    </script>
    <!-- End Meta Pixel Code -->
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f5f7f4;
        color: #111;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(100%, 520px);
        border: 1px solid #e4e4e7;
        border-radius: 8px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 18px 54px rgba(17, 24, 39, 0.08);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #1d4985;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.18em;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.25;
      }

      p {
        margin: 12px 0 0;
        color: #52525b;
        font-size: 15px;
        line-height: 1.7;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 22px;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border: 1px solid #1d4985;
        border-radius: 8px;
        color: #1d4985;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
      }

      a.primary {
        background: #1d4985;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <p class="eyebrow">ITTEMMALL</p>
        <h1>결제 상태를 이어서 확인합니다.</h1>
        <p>
          주문번호가 있는 결제 링크는 해당 주문의 네이버페이 결제 준비 화면으로 이동합니다.
          주문번호 없이 들어왔다면 주문 내역에서 진행 중인 결제를 다시 선택해주세요.
        </p>
        <div class="actions">
          <a class="primary" href="../#/payment">결제 이어가기</a>
          <a href="../#/history">주문 내역</a>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var orderId = params.get("orderId") || "";
        if (!orderId) return;
        var hash = orderId ? "#/payment/" + encodeURIComponent(orderId) : "#/payment";
        window.setTimeout(function () {
          window.location.replace("../" + hash);
        }, 800);
      })();
    </script>
  </body>
</html>
