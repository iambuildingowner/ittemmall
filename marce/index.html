    <style>

      .main-image {

        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
        padding: 0;

      }

        function readJson(key, fallback) {
          try {
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : fallback;
          } catch {
            return fallback;
          }
        }

        function readSubmissionsStrict() {
          const raw = localStorage.getItem(storageKeys.submissions);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) {
            throw new Error("저장된 주문 내역 형식이 올바르지 않습니다.");
          }
          return parsed;
        }

        function saveSubmissions(items) {
          localStorage.setItem(storageKeys.submissions, JSON.stringify(items));
        }

        function savePixelEvent(event) {
          const events = readJson(storageKeys.pixelEvents, []);
          events.unshift(event);
          localStorage.setItem(storageKeys.pixelEvents, JSON.stringify(events.slice(0, 100)));
        }

        function trackPixelEvent(name, payload) {
          const event = {
            id: `PX-${Date.now()}-${Math.random().toString(36).slice(2, 7).toUpperCase()}`,
            name,
            payload,
            createdAt: new Date().toISOString(),
            path: location.hash || "#/home",
          };

          window.__ittemmallPixelEvents = window.__ittemmallPixelEvents || [];
          window.__ittemmallPixelEvents.push(event);
          window.dataLayer = window.dataLayer || [];
          window.dataLayer.push({ event: name, ...payload });

          if (typeof window.fbq === "function") {
            if (name === "InitiateCheckout") {
              window.fbq("track", "InitiateCheckout", payload);
            } else {
              window.fbq("trackCustom", name, payload);
            }
          }
          if (window.ttq && typeof window.ttq.track === "function") {
            window.ttq.track(name, payload);
          }
          if (window.kakaoPixel && typeof window.kakaoPixel === "function") {
            try {
              window.kakaoPixel().pageView();
            } catch {
              // Ignore missing pixel configuration in the static MVP.
            }
          }

          savePixelEvent(event);
          sendServerTrackingEvent(event);
          return event;
        }

        function sendServerTrackingEvent(event) {
          if (!trackingConfig.serverLoggedEvents.includes(event.name)) return;
          const body = JSON.stringify({
            event: event.name,
            payload: event.payload || {},
            meta_pixel_id: trackingConfig.metaPixelId,
            brand: "MARCE",
            product_focus: event.payload?.productSlug || event.payload?.productId || "marce",
            path: `${location.pathname}${location.search}${location.hash || ""}`,
            url: location.href,
            referrer: document.referrer,
            attribution: readAttribution(),
          });

          try {
            const blob = new Blob([body], { type: "application/json" });
            if (navigator.sendBeacon?.(trackingConfig.serverEndpoint, blob)) return;
          } catch {}

          fetch(trackingConfig.serverEndpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body,
            keepalive: true,
          }).catch(() => {
            // Tracking should never block the purchase flow.
          });
        }

        function readAttribution() {
          const params = new URLSearchParams(location.search);
          const fields = [
            "utm_source",
            "utm_medium",
            "utm_campaign",
            "utm_content",
            "utm_term",
            "utm_id",
            "campaign_id",
            "adset_id",
            "ad_id",
            "fbclid",
            "product",
          ];
          return fields.reduce((acc, key) => {
            const value = params.get(key);
            if (value) acc[key] = value;
            return acc;
          }, {});
        }

        function buildCommercePayload(product, extra = {}) {
          const quantity = Number(state.quantity || 1);
          const amount = getOrderTotal(product, quantity);
          return {
            productId: product.id,
            productSlug: productRouteId(product.id),
            productName: product.name,
            content_ids: [product.id],
            content_name: product.name,
            content_type: "product",
            currency: "KRW",
            value: amount,
            price: product.price,
            extraFee: Number(product.extraFee || 0),
            quantity,
            amount,
            selectedOptions: { ...state.selectedOptions },
            page: state.page,
            route: hashForState(),
            attribution: readAttribution(),
            ...extra,
          };
        }

        function trackCommerceEvent(name, extra = {}, product = currentProduct()) {
          return trackPixelEvent(name, buildCommercePayload(product, extra));
        }

        function persistState() {
          localStorage.setItem(
            storageKeys.state,
            JSON.stringify({ ...state, menuOpen: false, infoPanelType: "" }),
          );
        }

        function escapeHtml(value) {
          return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
        }

        function formatPrice(value) {
          return new Intl.NumberFormat("ko-KR").format(value || 0);
        }

        function getOrderTotal(product, quantity) {
          return product.price * Number(quantity || 1) + Number(product.extraFee || 0);
        }

        function formatDate(value) {
          if (!value) return "-";
          return new Intl.DateTimeFormat("ko-KR", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
          }).format(new Date(value));
        }

        function maskPhone(value) {
          const digits = String(value || "").replace(/\D/g, "");
          if (digits.length >= 10) {
            return `${digits.slice(0, 3)}-${digits.slice(3, 7)}-****`;
          }
          return "010-****-****";
        }

        function getInitialSelectedOptions(product) {
          return product.options.reduce((acc, option) => {
            acc[option.label] = option.values[0];
            return acc;
          }, {});
        }

        function findProduct(id) {
          return products.find((product) => product.id === id);
        }

        function productRouteSlug(product) {
          const color = product.options
            .find((option) => option.label === "색상")
            ?.values[0];
          if (color === "핑크") return "pink";
          if (color === "블랙") return "black";
          return product.id;
        }

        function productRouteId(productId) {
          const product = findProduct(productId);
          return product ? productRouteSlug(product) : productId;
        }

        function productFromRouteId(routeId) {
          return (
            products.find((product) => productRouteSlug(product) === routeId) ||
            findProduct(routeId)
          );
        }

        function currentProduct() {
          return findProduct(state.selectedProductId) || products[0];
        }

        function hasDraft() {
          return Object.entries(state.form).some(([key, value]) => {
            if (key.startsWith("agree")) return Boolean(value);
            return String(value || "").trim().length > 0;
          });
        }

        function isFormReady() {
          return Boolean(
            state.form.name.trim() &&
              state.form.phone.trim() &&
              state.form.email.trim() &&
              state.form.fulfillmentPrimary.trim() &&
              state.form.agreeNotice,
          );
        }

        function pageKey() {
          if (state.page === "detail") return `detail:${state.selectedProductId}`;
          if (state.page === "submissionDetail") {
            return `submission:${state.viewSubmissionId}`;
          }
          return state.page;
        }

        function saveScroll() {
          state.scroll[pageKey()] = window.scrollY;
          persistState();
        }

        function restoreScroll() {
          const y = state.scroll[pageKey()] || 0;
          window.scrollTo(0, y);
        }

        function hashForState() {
          if (state.page === "detail") return `#/product/${productRouteId(state.selectedProductId)}`;
          if (state.page === "apply") return "#/apply";
          if (state.page === "payment") return "#/payment";
          if (state.page === "complete") {
            return state.lastSubmissionId
              ? `#/complete/${state.lastSubmissionId}`
              : "#/complete";
          }
          if (state.page === "history") return "#/history";
          if (state.page === "submissionDetail") {
            return `#/submission/${state.viewSubmissionId}`;
          }
          return "#/home";
        }

        function setHash(hash) {
          if (location.hash !== hash) {
            suppressHashChange = true;
            location.hash = hash;
          }
        }

        function applyHash(hash) {
          const parts = hash.replace(/^#\/?/, "").split("/");
          const route = parts[0] || "home";
          const id = parts[1] || "";

          const routeProduct = productFromRouteId(id);
          if (route === "product" && routeProduct) {
            state.page = "detail";
            if (state.selectedProductId !== routeProduct.id) {
              state.selectedImageIndex = 0;
            }
            state.selectedProductId = routeProduct.id;
            ensureOptionsForProduct();
            return;
          }

          if (route === "apply") {
            state.page = "apply";
            ensureOptionsForProduct();
            return;
          }

          if (route === "payment") {
            state.page = "payment";
            ensureOptionsForProduct();
            return;
          }

          if (route === "complete") {
            state.page = "complete";
            state.lastSubmissionId = id || state.lastSubmissionId;
            return;
          }

          if (route === "history") {
            state.page = "history";
            return;
          }

          if (route === "info" && siteConfig.infoPanels[id]) {
            state.page = "home";
            state.infoPanelType = id;
            return;
          }

          if (route === "submission" && id) {
            state.page = "submissionDetail";
            state.viewSubmissionId = id;
            return;
          }

          state.page = "home";
        }

        function handleHashChange() {
          if (suppressHashChange) {
            suppressHashChange = false;
            return;
          }
          saveScroll();
          state.menuOpen = false;
          state.infoPanelType = "";
          applyHash(location.hash);
          if (state.page === "history") loadHistory();
          persistState();
          render();
          requestAnimationFrame(restoreScroll);
        }

        function navigate(page, patch = {}) {
          saveScroll();
          Object.assign(state, patch, { page, menuOpen: false, infoPanelType: "" });
          if (page === "history") loadHistory();
          persistState();
          setHash(hashForState());
          render();
          requestAnimationFrame(restoreScroll);
        }

        function ensureOptionsForProduct() {
          const product = currentProduct();
          const optionMap = product.options.reduce((acc, option) => {
            acc[option.label] = option.values;
            return acc;
          }, {});
          const labels = Object.keys(optionMap).sort().join("|");
          const stateLabels = Object.keys(state.selectedOptions || {})
            .sort()
            .join("|");
          const hasInvalidValue = Object.entries(state.selectedOptions || {}).some(
            ([label, value]) => !optionMap[label]?.includes(value),
          );
          if (labels !== stateLabels || hasInvalidValue) {
            state.selectedOptions = getInitialSelectedOptions(product);
          }
        }

        function selectProduct(id, origin = null) {
          const product = findProduct(id);
          if (!product) return;
          navigate("detail", {
            selectedProductId: product.id,
            selectedImageIndex: 0,
            selectedOptions: getInitialSelectedOptions(product),
            quantity: 1,
            form: { ...emptyForm },
            editingSubmissionId: "",
            origin:
              origin ||
              {
                page: state.page,
                label: originLabel(),
                hash: hashForState(),
              },
          });

        function originLabel() {
          if (state.page === "history") return "주문 내역 확인";
          if (state.page === "submissionDetail") return "주문 상세 확인";
          if (state.page === "apply") return "주문서 작성";
          return "메인 상품 탐색";
        }

        function loadHistory() {
          historyView = { status: "loading", items: [], error: "" };
          window.setTimeout(() => {
            try {
              const items = readSubmissionsStrict().sort(
                (a, b) => new Date(b.updatedAt) - new Date(a.updatedAt),
              );
              historyView = {
                status: items.length ? "success" : "empty",
                items,
                error: "",
              };
            } catch (error) {
              historyView = {
                status: "error",
                items: [],
                error: error.message || "주문 내역을 불러오지 못했습니다.",
              };
            }
            if (state.page === "history") render();
          }, 220);
        }

        function handleClick(event) {
          const target = event.target.closest("[data-action]");
          if (!target) return;

          const action = target.dataset.action;
          const id = target.dataset.id || "";
          const optionLabel = target.dataset.optionLabel || "";
          const optionValue = target.dataset.optionValue || "";

          if (action === "toggle-menu") {
            state.menuOpen = !state.menuOpen;
            persistState();
            render();
          }
          if (action === "close-menu") {
            state.menuOpen = false;
            persistState();
            render();
          }
          if (action === "open-info") {
            state.infoPanelType = target.dataset.panel || "purchase";
            state.menuOpen = false;
            persistState();
            render();
          }
          if (action === "close-info") {
            state.infoPanelType = "";
            if (location.hash.startsWith("#/info/")) {
              setHash(hashForState());
            }
            persistState();
            render();
          }

          if (action === "home") {
            navigate("home", {
              origin: { page: "home", label: "메인 상품 탐색", hash: "#/home" },
            });
          }

          if (action === "back") goBack();
          if (action === "history") navigate("history");
          if (action === "search") {
            navigate("home");
            window.setTimeout(() => {
              document.getElementById("productSearch")?.focus();
              document.getElementById("products")?.scrollIntoView({ block: "start" });
            }, 40);
          }
          if (action === "menu-products") {
            navigate("home");
            window.setTimeout(() => {
              document.getElementById("products")?.scrollIntoView({ block: "start" });
            }, 40);
          }
          if (action === "support") {
            state.infoPanelType = "support";
            state.menuOpen = false;
            persistState();
            render();
          }
          if (action === "select-image") {
            clearGallerySwipeCommit();
            resetGallerySwipe();
            state.selectedImageIndex = Number(target.dataset.index || 0);
            persistState();
            render();
          }
          if (action === "select-option" && optionLabel) {
            state.selectedOptions[optionLabel] = optionValue;
            persistState();
            render();
          }
          if (action === "select-product") {
            const product = findProduct(id);
            if (product) {
              trackCommerceEvent(
                "ProductDetailClick",
                {
                  source: target.dataset.pixelSource || "product_card",
                  buttonLabel: target.textContent.trim(),
                },
                product,
              );
            }
            selectProduct(id);
          }
          if (action === "select-product-from-origin") {
            selectProduct(id, {
              page: "history",
              label: "주문 내역 확인",
              hash: "#/history",
            });
          }
          if (action === "apply") {
            const checkoutSource = target.dataset.checkoutSource || "direct_buy";
            const isNpay = checkoutSource === "npay";
            trackCommerceEvent(isNpay ? "NpayPurchaseClick" : "PurchaseCtaClick", {
              source: checkoutSource,
              buttonLabel: target.textContent.trim(),
              paymentMethod: isNpay ? "naver_pay" : "standard",
              fakeDoorEvent: isNpay ? "NpayCheckoutIntent" : "PurchaseIntent",
            });
            if (isNpay) return;
            navigate("apply", {
              origin: {
                page: "detail",
                label: `${currentProduct().name} 상세`,
                hash: `#/product/${productRouteId(state.selectedProductId)}`,
              },
            });
          }
          if (action === "resume-origin") resumeOrigin();
          if (action === "quantity-minus") {
            state.quantity = Math.max(1, Number(state.quantity || 1) - 1);
            navigate(state.page);
          }
          if (action === "quantity-plus") {
            state.quantity = Number(state.quantity || 1) + 1;
            navigate(state.page);
          }
          if (action === "submit-apply") submitApply();
          if (action === "view-submission") {
            navigate("submissionDetail", { viewSubmissionId: id });
          }
          if (action === "edit-submission") editSubmission(id);
          if (action === "retry-history") loadHistory();
          if (action === "resume-draft") navigate("apply");
          if (action === "clear-local-data") {
            if (confirm("저장된 주문 내역과 작성 중 상태를 모두 지울까요?")) {
              localStorage.removeItem(storageKeys.submissions);
              localStorage.removeItem(storageKeys.state);
              Object.assign(state, {
                page: "home",
                selectedProductId: products[0].id,
                selectedImageIndex: 0,
                selectedOptions: getInitialSelectedOptions(products[0]),
                quantity: 1,
                form: { ...emptyForm },
                origin: { page: "home", label: "메인 상품 탐색", hash: "#/home" },
                editingSubmissionId: "",
                completeMode: "create",
                lastSubmissionId: "",
                viewSubmissionId: "",
                menuOpen: false,
                infoPanelType: "",
                searchQuery: "",
                scroll: {},
              });
              navigate("home");
            }
          }
        }

        function handleGalleryPointerDown(event) {
          if (event.pointerType === "mouse" && event.button !== 0) return;
          const target = event.target.closest("[data-gallery-swipe]");
          if (!target || state.page !== "detail") return;
          const images = currentProduct().images?.length ? currentProduct().images : [currentProduct().image];
          if (images.length < 2) return;
          clearGallerySwipeCommit();
          target.classList.remove("is-dragging");
          target.style.setProperty("--drag-offset", "0px");
          gallerySwipe = {
            pointerId: event.pointerId,
            target,
            startX: event.clientX,
            startY: event.clientY,
            currentX: event.clientX,
            currentY: event.clientY,
            width: target.clientWidth || window.innerWidth,
            active: false,
          };
        }

        function handleGalleryPointerMove(event) {
          if (!gallerySwipe || gallerySwipe.pointerId !== event.pointerId) return;
          const swipe = gallerySwipe;
          if (!swipe.target.isConnected) {
            resetGallerySwipe();
            return;
          }

          swipe.currentX = event.clientX;
          swipe.currentY = event.clientY;
          const deltaX = swipe.currentX - swipe.startX;
          const deltaY = swipe.currentY - swipe.startY;
          const absX = Math.abs(deltaX);
          const absY = Math.abs(deltaY);

          if (!swipe.active) {
            if (absY > 18 && absY > absX * 1.15) {
              resetGallerySwipe();
              return;
            }
            if (absX < 8 || absX < absY * 1.1) return;
            swipe.active = true;
            swipe.target.classList.add("is-dragging");
          }

          const width = swipe.target.clientWidth || swipe.width || window.innerWidth;
          swipe.width = width;
          const clampedDelta = clamp(deltaX, -width, width);
          swipe.target.style.setProperty("--drag-offset", `${clampedDelta}px`);
        }

        function handleGalleryPointerUp(event) {
          if (!gallerySwipe || gallerySwipe.pointerId !== event.pointerId) return;
          const swipe = gallerySwipe;
          const deltaX = (swipe.currentX ?? event.clientX) - swipe.startX;
          const deltaY = (swipe.currentY ?? event.clientY) - swipe.startY;
          const absX = Math.abs(deltaX);
          const absY = Math.abs(deltaY);
          const width = swipe.target.clientWidth || swipe.width || window.innerWidth;
          const threshold = Math.min(90, width * 0.22);
          if (!swipe.active || absX < threshold || absX < absY * 1.1) {
            resetGallerySwipe();
            return;
          }
          commitGallerySwipe(deltaX < 0 ? 1 : -1, swipe.target, width);
        }

        function resetGallerySwipe() {
          const swipe = gallerySwipe;
          gallerySwipe = null;
          if (!swipe?.target?.isConnected) return;
          swipe.target.classList.remove("is-dragging");
          swipe.target.style.setProperty("--drag-offset", "0px");
        }

        function clearGallerySwipeCommit() {
          if (!gallerySwipeCommitTimer) return;
          window.clearTimeout(gallerySwipeCommitTimer);
          gallerySwipeCommitTimer = 0;
        }

        function commitGallerySwipe(direction, target, width) {
          gallerySwipe = null;
          target.classList.remove("is-dragging");
          target.style.setProperty("--drag-offset", `${direction > 0 ? -width : width}px`);
          clearGallerySwipeCommit();
          gallerySwipeCommitTimer = window.setTimeout(() => {
            gallerySwipeCommitTimer = 0;
            shiftGalleryImage(direction);
          }, 190);
        }

        function clamp(value, min, max) {
          return Math.min(Math.max(value, min), max);
        }

        function shiftGalleryImage(direction) {
          const images = currentProduct().images?.length ? currentProduct().images : [currentProduct().image];
          if (images.length < 2) return;
          const currentIndex = Math.min(
            Math.max(Number(state.selectedImageIndex || 0), 0),
            images.length - 1,
          );
          state.selectedImageIndex = (currentIndex + direction + images.length) % images.length;
          persistState();
          render();
        }

        function handleInput(event) {
          const field = event.target.dataset.field;
          const search = event.target.dataset.search;

          if (field) {
            state.form[field] = event.target.value;
            persistState();
            syncSubmitButton();
          }

          if (search) {
            state.searchQuery = event.target.value;
            persistState();
            updateProductVisibility();
          }
        }

        function handleChange(event) {
          const field = event.target.dataset.field;
          const optionLabel = event.target.dataset.optionLabel;

          if (field) {
            state.form[field] =
              event.target.type === "checkbox" ? event.target.checked : event.target.value;
            persistState();
            syncSubmitButton();
          }

          if (optionLabel) {
            state.selectedOptions[optionLabel] = event.target.value;
            persistState();
          }
        }

        function syncSubmitButton() {
          const button = document.querySelector('[data-action="submit-apply"]');
          if (button) button.disabled = !isFormReady();
        }

        function updateProductVisibility() {
          const query = state.searchQuery.trim().toLowerCase();
          document.querySelectorAll("[data-product-card]").forEach((card) => {
            const haystack = card.dataset.productCard.toLowerCase();
            card.classList.toggle("hidden", query && !haystack.includes(query));
          });
          const empty = document.getElementById("productFilterEmpty");
          if (empty) {
            const visibleCount = document.querySelectorAll(
              "[data-product-card]:not(.hidden)",
            ).length;
            empty.classList.toggle("hidden", visibleCount > 0);
          }
        }

        function goBack() {
          if (state.page === "detail") {
            resumeOrigin();
            return;
          }
          if (state.page === "apply") {
            navigate("detail");
            return;
          }
          if (state.page === "payment") {
            navigate("apply");
            return;
          }
          if (state.page === "complete") {
            navigate("history");
            return;
          }
          if (state.page === "submissionDetail") {
            navigate("history");
            return;
          }
          navigate("home");
        }

        function resumeOrigin() {
          const origin = state.origin || { page: "home", hash: "#/home" };
          if (origin.page === "history") {
            navigate("history");
            return;
          }
          if (origin.page === "submissionDetail" && state.viewSubmissionId) {
            navigate("submissionDetail");
            return;
          }
          navigate("home");
        }

        function submitApply() {
          if (!isFormReady()) return;

          const product = currentProduct();
          const payload = buildCommercePayload(product, {
            source: "payment_page_button",
            buttonLabel: "결제 페이지로 이동하기",
            paymentMethod: "standard",
            customerFields: {
              hasName: Boolean(state.form.name.trim()),
              hasPhone: Boolean(state.form.phone.trim()),
              hasEmail: Boolean(state.form.email.trim()),
              hasFulfillmentPrimary: Boolean(state.form.fulfillmentPrimary.trim()),
              hasRequest: Boolean(state.form.request.trim()),
              agreeContact: Boolean(state.form.agreeContact),
            },
            originLabel: state.origin?.label || "상품 탐색",
            fakeDoorEvent: "PaymentPageIntent",
          });
          trackPixelEvent("PaymentPageButtonClick", payload);
          trackPixelEvent("InitiateCheckout", payload);
          window.location.assign(new URL("./payment/", window.location.href).toString());
        }

        function editSubmission(id) {
          const item = readJson(storageKeys.submissions, []).find(
            (submission) => submission.id === id,
          );
          if (!item) {
            navigate("history");
            return;
          }

          navigate("apply", {
            selectedProductId: item.productId,
            selectedOptions: { ...item.selectedOptions },
            quantity: item.quantity,
            form: { ...emptyForm, ...item.customer },
            editingSubmissionId: id,
            origin: {
              page: "submissionDetail",
              label: "주문 상세 수정",
              hash: `#/submission/${id}`,
            },
          });
        }

        function renderOptionSelect(option) {
          const value = state.selectedOptions[option.label] || option.values[0];
          if (option.label === "색상") return renderColorOption(option, value);
          if (option.label === "타입") return renderTypeOption(option, value);
          return `
            <div class="option-field">
              <span class="field-label">${escapeHtml(option.label)}</span>
              <div class="option-grid">
                ${option.values
                  .map((item) => renderOptionButton(option.label, item, item === value))
                  .join("")}
              </div>
            </div>
          `;
        }

        function renderColorOption(option, selectedValue) {
          return `
            <div class="option-field">
              <span class="field-label">${escapeHtml(option.label)}</span>
              <div class="color-swatch-row">
                ${option.values
                  .map(
                    (item) => `
                      <button
                        class="color-swatch-button ${item === selectedValue ? "is-selected" : ""}"
                        type="button"
                        data-action="select-option"
                        data-option-label="${escapeHtml(option.label)}"
                        data-option-value="${escapeHtml(item)}"
                        style="--swatch-color:${escapeHtml(getColorSwatch(item))}"
                        aria-label="${escapeHtml(item)} 색상 선택"
                        aria-pressed="${item === selectedValue ? "true" : "false"}"
                      ></button>
                    `,
                  )
                  .join("")}
                <span class="color-swatch-name">${escapeHtml(selectedValue)}</span>
              </div>
            </div>
          `;
        }

        function renderTypeOption(option, selectedValue) {
          return `
            <div class="option-field">
              <span class="field-label">${escapeHtml(option.label)}</span>
              <div class="type-value">${escapeHtml(selectedValue)}</div>
            </div>
          `;
        }

        function renderOptionButton(label, value, selected) {
          const tone = getOptionTone(value);
          return `
            <button
              class="option-button ${tone ? `tone-${tone}` : ""} ${selected ? "is-selected" : ""}"
              type="button"
              data-action="select-option"
              data-option-label="${escapeHtml(label)}"
              data-option-value="${escapeHtml(value)}"
              aria-pressed="${selected ? "true" : "false"}"
            >
              <span>${escapeHtml(formatOptionLabel(value))}</span>
              ${selected ? `<span class="option-check">${icon("check", 20)}</span>` : ""}
            </button>
          `;
        }

        function getOptionTone(value) {
          const normalized = String(value).trim().toLowerCase();
          if (["black", "블랙"].includes(normalized)) return "black";
          if (["white", "화이트"].includes(normalized)) return "white";
          if (["gray", "grey", "그레이"].includes(normalized)) return "gray";
          if (["pink", "핑크"].includes(normalized)) return "pink";
          return "";
        }

        function getColorSwatch(value) {
          const normalized = String(value).trim().toLowerCase();
          if (["pink", "핑크"].includes(normalized)) return "#e5bcc0";
          if (["black", "블랙"].includes(normalized)) return "#111111";
          if (["white", "화이트"].includes(normalized)) return "#ffffff";
          if (["gray", "grey", "그레이"].includes(normalized)) return "#d4d4d8";
          return "#e5bcc0";
        }

        function formatOptionLabel(value) {
          const normalized = String(value).trim().toLowerCase();
          if (normalized === "블랙") return "BLACK";
          if (normalized === "화이트") return "WHITE";
          if (normalized === "그레이") return "GRAY";
          if (normalized === "핑크") return "핑크";
          return value;
        }
