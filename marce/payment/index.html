          content_type: "product",

        };
        var body = JSON.stringify({

          meta_pixel_id: "1288524852852406",

        try {

          if (navigator.sendBeacon && navigator.sendBeacon("/track.php", blob)) return;
        } catch {}
        fetch("/track.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: body,
          keepalive: true,
        }).catch(function () {});
