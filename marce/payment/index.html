<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light only" />
    <meta name="darkreader-lock" />
    <meta name="robots" content="noindex,nofollow" />
    <title>MARCE Payment</title>
    <link rel="canonical" href="https://ittemmall.com/marce/payment/" />
    <!-- Meta Pixel Code -->
    <script>
      (function () {
        var pixelId = "1288524852852406";
        var params = new URLSearchParams(window.location.search);
        var isTest =
          params.get("test") === "1" ||
          params.get("codex_test") === "1" ||
          params.get("pixel_test") === "1";
        var payload = {
          content_ids: ["product-001"],
          content_name: "MARCE Sweet Pickleball Paddle Pink",
          content_type: "product",
          value: 79000,
          currency: "KRW",
          product_slug: "pink",
          site_name: "ittemmall",
          checkout_scope: "ittemmall_marce_pink",
          source: "marce_payment_placeholder_url",
          fakeDoorEvent: "PaymentPageView",
        };

        if (isTest) payload.__test = true;

        window.dataLayer = window.dataLayer || [];
        pushDataLayerEvent("MarcePaymentPageView");
        pushDataLayerEvent("PaymentPageView");

        if (!isTest) {
          (function (f, b, e, v, n, t, s) {
            if (f.fbq) return;
            n = f.fbq = function () {
              n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
            };
            if (!f._fbq) f._fbq = n;
            n.push = n;
            n.loaded = true;
            n.version = "2.0";
            n.queue = [];
            t = b.createElement(e);
            t.async = true;
            t.src = v;
            s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s);
          })(window, document, "script", "https://connect.facebook.net/en_US/fbevents.js");

          window.fbq("init", pixelId);
          window.fbq("track", "PageView");
          window.fbq("trackCustom", "MarcePaymentPageView", payload);
          window.fbq("trackCustom", "PaymentPageView", payload);
        }

        sendServerEvent("MarcePaymentPageView");
        sendServerEvent("PaymentPageView");

        function pushDataLayerEvent(eventName) {
          window.dataLayer.push(Object.assign({ event: eventName }, payload));
        }

        function sendServerEvent(eventName) {
          try {
            var event = {
              event: eventName,
              payload: payload,
              path: "/marce/payment/",
              url: window.location.href,
              referrer: document.referrer || "",
              attribution: {},
              timestamp: new Date().toISOString(),
              meta_pixel_id: pixelId,
              brand: "MARCE",
              product_focus: "marce-pickleball-paddle-pink",
            };
            var body = JSON.stringify(event);
            if (navigator.sendBeacon) {
              var blob = new Blob([body], { type: "application/json" });
              if (navigator.sendBeacon("/track.php", blob)) return;
            }
            fetch("/track.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: body,
              credentials: "same-origin",
              keepalive: true,
            }).catch(function () {});
          } catch (error) {}
        }
      })();
    </script>
    <!-- End Meta Pixel Code -->
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #fff;
      }
    </style>
  </head>
  <body></body>
</html>
