<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="color-scheme" content="light only" />
    <meta name="darkreader-lock" />
    <title>ITTEMMALL | 페이지를 찾을 수 없습니다</title>
    <link rel="icon" type="image/svg+xml" href="/assets/ittemmall/favicon.svg" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f8fb;
        color: #101828;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      section {
        width: min(100%, 560px);
        border: 1px solid #e4e7ec;
        border-radius: 8px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 20px 54px rgba(16, 24, 40, 0.08);
      }

      .brand {
        margin: 0 0 8px;
        color: #1d4985;
        font-size: 13px;
        font-weight: 950;
        letter-spacing: 0.16em;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.25;
      }

      p {
        margin: 12px 0 0;
        color: #667085;
        font-size: 15px;
        line-height: 1.7;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 22px;
      }

      a {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        border: 1px solid #1d4985;
        border-radius: 8px;
        color: #1d4985;
        font-size: 14px;
        font-weight: 900;
        text-decoration: none;
      }

      a.primary {
        background: #1d4985;
        color: #fff;
      }

      @media (max-width: 560px) {
        section {
          padding: 22px;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="brand">ITTEMMALL</p>
        <h1>페이지를 찾을 수 없습니다.</h1>
        <p>
          주소가 바뀌었거나 입력한 링크가 올바르지 않습니다.
          상품 탐색, 주문 내역, 결제 확인 화면으로 바로 이동할 수 있습니다.
        </p>
        <div class="actions">
          <a class="primary" href="/#/home">상품 보기</a>
          <a href="/#/history">주문 내역</a>
          <a href="/payment/">결제 확인</a>
        </div>
      </section>
    </main>
  </body>
</html>
